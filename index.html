// ─── PERSISTENT STORAGE ───────────────────────────────────────────────────────
function useLocalStorage(key, initialValue) {
const [storedValue, setStoredValue] = useState(() => {
try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : initialValue; } catch { return initialValue; }
});
const setValue = (value) => {
try {
const v = value instanceof Function ? value(storedValue) : value;
setStoredValue(v);
window.localStorage.setItem(key, JSON.stringify(v));
} catch (err) { console.warn(“localStorage error:”, err); }
};
return [storedValue, setValue];
}

function hargaPerUnit(s) {
if (!s) return 0;
if (s.satuan===“pcs”) return s.harga_beli_per_pcs||0;
return s.harga_beli_per_gram||0;
}
function calcHPP(menu, stok, biayaOps) {
let hpp_bahan=0;
menu.bahan.forEach(b => { const s=stok[b.bahan_id]; if(s) hpp_bahan+=b.qty*hargaPerUnit(s); });
const ops = biayaOps || menu.biaya_tambahan || {};
const biaya = Object.values(ops).reduce((a,b)=>a+Number(b),0);
return { hpp_bahan:Math.round(hpp_bahan), biaya_tambahan:biaya, hpp_total:Math.round(hpp_bahan+biaya) };
}
function getStokPersen(s) { return s.stok_awal>0?Math.round((s.stok_saat_ini/s.stok_awal)*100):0; }
function getStokWarna(pct) {
if(pct>=70) return {bg:”#22c55e”,text:”#15803d”,light:”#dcfce7”,label:“Aman”};
if(pct>=30) return {bg:”#f59e0b”,text:”#b45309”,light:”#fef3c7”,label:“Warning”};
return {bg:”#ef4444”,text:”#b91c1c”,light:”#fee2e2”,label:“Kritis”};
}
function fmtStokQty(s,field=“stok_saat_ini”) {
const qty=s[field]||0;
if(s.satuan===“pcs”) return `${qty} pcs`;
if(qty>=1000) return `${(qty/1000).toFixed(2)} ${s.satuan==="gram"?"kg":"L"}`;
return `${qty} ${s.satuan}`;
}
function fmtHargaPerUnit(s) {
if(s.satuan===“pcs”) return `${fmt(s.harga_beli_per_pcs||0)}/pcs`;
return `${fmt((s.harga_beli_per_gram||0)*1000)}/kg`;
}
function nilaiStok(s) {
if(s.satuan===“pcs”) return s.stok_saat_ini*(s.harga_beli_per_pcs||0);
return s.stok_saat_ini*(s.harga_beli_per_gram||0);
}
function hitungPorsi(menu,stok) {
if(!menu.bahan||menu.bahan.length===0) return 0;
let min=Infinity;
menu.bahan.forEach(b=>{ const s=stok[b.bahan_id]; if(!s||b.qty<=0) return; const p=Math.floor(s.stok_saat_ini/b.qty); if(p<min) min=p; });
return min===Infinity?0:min;
}
function bottleneckBahan(menu,stok) {
let min=Infinity,nama=””;
menu.bahan.forEach(b=>{ const s=stok[b.bahan_id]; if(!s||b.qty<=0) return; const p=Math.floor(s.stok_saat_ini/b.qty); if(p<min){min=p;nama=b.nama;} });
return nama;
}

const reduceStok = (items) => {
setStok(prev => {
const next = {…prev};
items.forEach(({menu_id,qty,perlengkapan_ids}) => {
// Kurangi bahan menu
const menu = menus.find(m=>m.id===menu_id);
if(menu) menu.bahan.forEach(b => {
if(next[b.bahan_id]) next[b.bahan_id]={…next[b.bahan_id],stok_saat_ini:Math.max(0,next[b.bahan_id].stok_saat_ini-b.qty*qty)};
});
});
return next;
});
// Kurangi perlengkapan
items.forEach(item => {
if(item.perlengkapan_ids && item.perlengkapan_ids.length>0) {

});
return next;
});
}
});
};

setHargaBeli(s?.harga_beli_per_unit?.toString()||””);
setInputQty(””);
};

const handleTambahStok=()=>{
if(!selected||!inputQty||!hargaBeli) return alert(“Lengkapi semua field!”);
const konversi=UNIT_KONVERSI[inputUnit]||1;
const qtyDasar=Number(inputQty)*konversi;
const hargaPerDasar=isPcs?Number(hargaBeli)/konversi:Number(hargaBeli)/(Number(inputQty)*konversi);

setInputQty(””);setHargaBeli(””);setSelected(””);
};

const toBaseDasar=(s,val)=>{const num=parseFloat(val);if(s.satuan===“pcs”) return num;return(s.stok_awal>=1000||s.stok_saat_ini>=1000)?num*1000:num;};
const handleEditStok=(id)=>{const s=stok[id];setEditVal(toDisplayVal(s,“stok_saat_ini”));setEditMax(toDisplayVal(s,“stok_awal”));setEditId(id);};

const s=stok[id];

if(isNaN(vT)||vT<0) return alert(“Stok tersedia tidak valid!”);
if(isNaN(vM)||vM<=0) return alert(“Stok maksimal harus > 0!”);
if(vT>vM) return alert(“Tersedia tidak boleh melebihi maksimal!”);
setStok(prev=>({…prev,[id]:{…prev[id],stok_saat_ini:toBaseDasar(s,editVal),stok_awal:toBaseDasar(s,editMax)}}));
setEditId(null);setEditVal(””);setEditMax(””);
};
const handleCancelEdit=()=>{setEditId(null);setEditVal(””);setEditMax(””);};

const displayUnit=(s)=>s.satuan===“pcs”?“pcs”:(s.stok_awal>=1000||s.stok_saat_ini>=1000)?(s.satuan===“gram”?“kg”:“L”):s.satuan;

const previewHarga=()=>{
if(!inputQty||!hargaBeli) return null;

function StrukPage({tx,menus,paket,onClose}) {

const printStruk=async()=>{
// Web Bluetooth Print — mencoba connect ke printer thermal BT
if(!navigator.bluetooth){alert(“Browser ini tidak mendukung Bluetooth. Gunakan Chrome di Android/desktop.”);return;}
try{
const device=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:[“000018f0-0000-1000-8000-00805f9b34fb”]});
const server=await device.gatt.connect();
const service=await server.getPrimaryService(“000018f0-0000-1000-8000-00805f9b34fb”);
const char=await service.getCharacteristic(“00002af1-0000-1000-8000-00805f9b34fb”);
const enc=new TextEncoder();
const lines=[
“\x1B\x40”,”\x1B\x61\x01”,
`${namaRestoran}\n`,”\x1B\x61\x00”,
“================================\n”,
`${fmtTgl(tx.waktu)} ${fmtJam(tx.waktu)}\n`,
`Order: ${tx.tipe==="takeaway"?"Take Away":"Dine In"}\n`,

“================================\n”,
“   Terima kasih!\n\n\n”,”\x1D\x56\x00”
];
for(const line of lines){await char.writeValue(enc.encode(line));}
alert(“Struk berhasil dikirim ke printer!”);
}catch(e){
if(e.name===“NotFoundError”) alert(“Printer tidak dipilih.”);
else alert(“Gagal print: “+e.message+”\n\nPastikan printer thermal BT menyala dan dalam jangkauan.”);
}
};

function LaporanPage({transaksi,menus,paket}) {
const [periode,setPeriode]=useState(“harian”);
const [tglFilter,setTglFilter]=useState(new Date().toISOString().slice(0,10));
const [bulanFilter,setBulanFilter]=useState(new Date().toISOString().slice(0,7));

const filterTx=(txList)=>{
if(periode===“harian”) return txList.filter(t=>t.waktu.slice(0,10)===tglFilter);
if(periode===“mingguan”){
const base=new Date(tglFilter);base.setDate(base.getDate()-base.getDay());
const end=new Date(base);end.setDate(end.getDate()+6);
return txList.filter(t=>{const d=new Date(t.waktu);return d>=base&&d<=end;});
}
if(periode===“bulanan”) return txList.filter(t=>t.waktu.slice(0,7)===bulanFilter);
return txList;
};
const filtered=filterTx(transaksi);
const totalPendapatan=filtered.reduce((a,t)=>a+t.total,0);
const totalTransaksi=filtered.length;
const rataPerTx=totalTransaksi>0?Math.round(totalPendapatan/totalTransaksi):0;

// Menu terlaris dalam periode
const menuCount={};
filtered.forEach(t=>t.items.forEach(i=>{menuCount[i.nama]=(menuCount[i.nama]||0)+i.qty;}));
const terlaris=Object.entries(menuCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

// Pendapatan per hari (untuk grafik mini)
const perHari={};
filtered.forEach(t=>{const d=t.waktu.slice(0,10);perHari[d]=(perHari[d]||0)+t.total;});
