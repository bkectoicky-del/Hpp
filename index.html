  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

      --surface: #ffffff;

      --border2: #d0d3e8;

      --text3: #8b90b0;
      --accent: #6366f1;

      --amber-dark: #92400e;
      --red: #ef4444;

      --red-dark: #991b1b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);

      --radius-sm: 10px;
      --radius-xs: 8px;
      --nav-h: 72px;

    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    input, select, button, textarea { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* Landscape helper */
    @media (orientation: landscape) and (max-height: 500px) {
      :root { --nav-h: 56px; }
    }

    /* Desktop */
    @media (min-width: 768px) {
      :root { --nav-h: 0px; }
    }
  </style>
  <script>
    const _origWarn = console.warn.bind(console);
    console.warn = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Babel transformer')) return;
      _origWarn(...args);
    };
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── STORAGE ─────────────────────────────────────────────────────────────────
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch { return initialValue; }
      });
      const setValue = (value) => {
        try {
          const v = value instanceof Function ? value(storedValue) : value;
          setStoredValue(v);
          window.localStorage.setItem(key, JSON.stringify(v));
        } catch (err) { console.warn("localStorage error:", err); }
      };
      return [storedValue, setValue];
    }

    function clearAllData() {
      ["restoku_menus", "restoku_stok", "restoku_transaksi"].forEach(k => window.localStorage.removeItem(k));
      window.location.reload();
    }

    // ─── SEED DATA ────────────────────────────────────────────────────────────────
    const SEED_MENUS = [
      { id: "m1", nama: "Ayam Geprek", kategori: "Makanan", harga_jual: 18000,
        biaya_tambahan: { listrik: 500, gas: 300, air: 100, labor: 2000 },
        bahan: [{ bahan_id: "b1", nama: "Ayam", qty: 120, satuan: "gram" }, { bahan_id: "b2", nama: "Tepung", qty: 50, satuan: "gram" }, { bahan_id: "b3", nama: "Minyak Goreng", qty: 15, satuan: "ml" }] },
      { id: "m2", nama: "Nasi Goreng", kategori: "Makanan", harga_jual: 15000,
        biaya_tambahan: { listrik: 400, gas: 400, air: 100, labor: 2000 },
        bahan: [{ bahan_id: "b4", nama: "Nasi", qty: 200, satuan: "gram" }, { bahan_id: "b5", nama: "Telur", qty: 1, satuan: "pcs" }, { bahan_id: "b3", nama: "Minyak Goreng", qty: 10, satuan: "ml" }] },
      { id: "m3", nama: "Es Teh Manis", kategori: "Minuman", harga_jual: 5000,
        biaya_tambahan: { listrik: 100, gas: 0, air: 200, labor: 500 },
        bahan: [{ bahan_id: "b6", nama: "Teh", qty: 5, satuan: "gram" }, { bahan_id: "b7", nama: "Gula", qty: 20, satuan: "gram" }] },
    ];
    const SEED_STOK = {
      "b1": { nama: "Ayam", stok_awal: 5000, stok_saat_ini: 3800, satuan: "gram", harga_beli_per_gram: 0.03, harga_beli_per_unit: 30000, unit_qty: 1000 },
      "b2": { nama: "Tepung", stok_awal: 3000, stok_saat_ini: 2450, satuan: "gram", harga_beli_per_gram: 0.012, harga_beli_per_unit: 12000, unit_qty: 1000 },
      "b3": { nama: "Minyak Goreng", stok_awal: 2000, stok_saat_ini: 1620, satuan: "ml", harga_beli_per_gram: 0.014, harga_beli_per_unit: 14000, unit_qty: 1000 },
      "b4": { nama: "Nasi", stok_awal: 10000, stok_saat_ini: 7200, satuan: "gram", harga_beli_per_gram: 0.01, harga_beli_per_unit: 10000, unit_qty: 1000 },
      "b5": { nama: "Telur", stok_awal: 40, stok_saat_ini: 28, satuan: "pcs", harga_beli_per_pcs: 2500, harga_beli_per_unit: 50000, unit_nama: "kodi", unit_qty: 20 },
      "b6": { nama: "Teh", stok_awal: 500, stok_saat_ini: 420, satuan: "gram", harga_beli_per_gram: 0.06, harga_beli_per_unit: 30000, unit_qty: 500 },
      "b7": { nama: "Gula", stok_awal: 5000, stok_saat_ini: 4100, satuan: "gram", harga_beli_per_gram: 0.013, harga_beli_per_unit: 13000, unit_qty: 1000 },
    };
    const SEED_TRANSAKSI = [
      { id: "t1", waktu: new Date(Date.now() - 3600000).toISOString(), items: [{ menu_id: "m1", nama: "Ayam Geprek", qty: 2, harga: 18000 }, { menu_id: "m3", nama: "Es Teh Manis", qty: 2, harga: 5000 }], total: 46000, bayar: 50000, kembalian: 4000 },
      { id: "t2", waktu: new Date(Date.now() - 7200000).toISOString(), items: [{ menu_id: "m2", nama: "Nasi Goreng", qty: 3, harga: 15000 }], total: 45000, bayar: 50000, kembalian: 5000 },
    ];

    // ─── HELPERS ─────────────────────────────────────────────────────────────────
    const fmt = (n) => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);
    const uid = () => Math.random().toString(36).slice(2, 9);

    function hargaPerUnit(s) {
      if (s.satuan === "pcs") return s.harga_beli_per_pcs || 0;
      return s.harga_beli_per_gram || 0;
    }
    function calcHPP(menu, stok) {
      let hpp_bahan = 0;
      menu.bahan.forEach(b => {
        const s = stok[b.bahan_id];
        if (!s) return;
        hpp_bahan += b.qty * hargaPerUnit(s);
      });
      const biaya = Object.values(menu.biaya_tambahan || {}).reduce((a, b) => a + Number(b), 0);
      return { hpp_bahan: Math.round(hpp_bahan), biaya_tambahan: biaya, hpp_total: Math.round(hpp_bahan + biaya) };
    }
    function getStokPersen(s) { return s.stok_awal > 0 ? Math.round((s.stok_saat_ini / s.stok_awal) * 100) : 0; }
    function getStokWarna(pct) {
      if (pct >= 70) return { bg: "#10b981", text: "#065f46", light: "#ecfdf5", label: "Aman" };
      if (pct >= 30) return { bg: "#f59e0b", text: "#92400e", light: "#fffbeb", label: "Warning" };
      return { bg: "#ef4444", text: "#991b1b", light: "#fef2f2", label: "Kritis" };
    }
    function hitungPorsi(menu, stok) {
      if (!menu.bahan || menu.bahan.length === 0) return 0;
      let minPorsi = Infinity;
      menu.bahan.forEach(b => {
        const s = stok[b.bahan_id];
        if (!s || b.qty <= 0) return;
        const porsi = Math.floor(s.stok_saat_ini / b.qty);
        if (porsi < minPorsi) minPorsi = porsi;
      });
      return minPorsi === Infinity ? 0 : minPorsi;
    }
    function bottleneckBahan(menu, stok) {
      let min = Infinity, nama = "";
      menu.bahan.forEach(b => {
        const s = stok[b.bahan_id];
        if (!s || b.qty <= 0) return;
        const porsi = Math.floor(s.stok_saat_ini / b.qty);
        if (porsi < min) { min = porsi; nama = b.nama; }
      });
      return nama;
    }
    function fmtStokQty(s, field = "stok_saat_ini") {
      const qty = s[field];
      if (s.satuan === "pcs") return `${qty} pcs`;
      if (qty >= 1000) return `${(qty / 1000).toFixed(2)} ${s.satuan === "gram" ? "kg" : "L"}`;
      return `${qty} ${s.satuan}`;
    }
    function fmtHargaPerUnit(s) {
      if (s.satuan === "pcs") return `${fmt(s.harga_beli_per_pcs || 0)}/pcs`;
      return `${fmt((s.harga_beli_per_gram || 0) * 1000)}/kg`;
    }
    function nilaiStok(s) {
      if (s.satuan === "pcs") return s.stok_saat_ini * (s.harga_beli_per_pcs || 0);
      return s.stok_saat_ini * (s.harga_beli_per_gram || 0);
    }

    // ─── ICONS ───────────────────────────────────────────────────────────────────
    const Icon = ({ name, size = 20, color = "currentColor" }) => {
      const paths = {
        menu: "M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z",
        stock: "M2 20h2v-4H2v4zm0-7h2V9H2v4zm0-7h2V2H2v4zm4 14h14v-2H6v2zm0-7h14V9H6v4zm0-7V4h14V2H6z",
        cashier: "M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 23.48 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z",
        dashboard: "M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z",
        plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
        trash: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
        edit: "M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
        check: "M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z",
        bell: "M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z",
        arrow_back: "M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z",
        close: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
        info: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z",
        trending: "M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z",
        food: "M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z",
        logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
        receipt: "M18 17H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2zM3 22l1.5-1.5L6 22l1.5-1.5L9 22l1.5-1.5L12 22l1.5-1.5L15 22l1.5-1.5L18 22l1.5-1.5L21 22V2l-1.5 1.5L18 2l-1.5 1.5L15 2l-1.5 1.5L12 2l-1.5 1.5L9 2 7.5 3.5 6 2 4.5 3.5 3 2v20z",
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={color} style={{ flexShrink: 0 }}>
          <path d={paths[name] || paths.info} />
        </svg>
      );
    };

    // ─── STYLE HELPERS ────────────────────────────────────────────────────────────
    const inputStyle = {
      width: "100%",
      background: "#f8f9fe",
      border: "1.5px solid #e4e6ef",
      borderRadius: 12,
      padding: "14px 16px",
      color: "#1a1d2e",
      fontSize: 15,
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      outline: "none",
      boxSizing: "border-box",
      transition: "border-color .15s",
    };
    const labelStyle = {
      fontSize: 12,
      fontWeight: 700,
      color: "#8b90b0",
      letterSpacing: 0.5,
      display: "block",
      marginBottom: 6,
      textTransform: "uppercase",
    };

    const btnPrimary = (color = "#6366f1") => ({
      display: "inline-flex", alignItems: "center", gap: 8,
      background: color, border: "none", borderRadius: 12, padding: "14px 20px",
      color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer",
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      boxShadow: `0 4px 12px ${color}40`,
      transition: "opacity .15s, transform .1s",
      minHeight: 52,
    });
    const btnSecondary = {
      display: "inline-flex", alignItems: "center", gap: 8,
      background: "#f0f1f7", border: "1.5px solid #e4e6ef", borderRadius: 12, padding: "12px 18px",
      color: "#4b5280", fontSize: 14, fontWeight: 700, cursor: "pointer",
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      minHeight: 48,
    };
    const btnDanger = {
      display: "inline-flex", alignItems: "center", gap: 8,
      background: "#fef2f2", border: "1.5px solid #fecaca", borderRadius: 12, padding: "10px 16px",
      color: "#ef4444", fontSize: 13, fontWeight: 700, cursor: "pointer",
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      minHeight: 44,
    };

    // ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
    function Card({ children, style = {} }) {
      return <div style={{ background: "#fff", borderRadius: 16, padding: "18px", boxShadow: "0 1px 4px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04)", ...style }}>{children}</div>;
    }
    function SectionTitle({ children, action }) {
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: "#8b90b0", letterSpacing: 1, textTransform: "uppercase" }}>{children}</div>
          {action}
        </div>
      );
    }
    function FormGroup({ label, children, style = {} }) {
      return (
        <div style={{ marginBottom: 14, ...style }}>
          <label style={labelStyle}>{label}</label>
          {children}
        </div>
      );
    }
    function EmptyState({ icon = "info", text }) {
      return (
        <div style={{ textAlign: "center", padding: "32px 20px", color: "#8b90b0" }}>
          <div style={{ marginBottom: 8, opacity: .5 }}><Icon name={icon} size={32} color="#8b90b0" /></div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{text}</div>
        </div>
      );
    }
    function Badge({ text, color = "#6366f1", bg = "#eef0ff" }) {
      return <span style={{ fontSize: 11, fontWeight: 800, color, background: bg, padding: "3px 10px", borderRadius: 20, letterSpacing: 0.3 }}>{text}</span>;
    }
    function ProgressBar({ pct, color, thin }) {
      return (
        <div style={{ background: "#f0f1f7", borderRadius: 99, height: thin ? 6 : 8, overflow: "hidden" }}>
          <div style={{ width: `${Math.min(100, pct)}%`, height: "100%", background: color, borderRadius: 99, transition: "width .6s cubic-bezier(.4,0,.2,1)" }} />
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState("dashboard");
      const [showNotif, setShowNotif] = useState(false);
      const [showReset, setShowReset] = useState(false);
      const [menus, setMenus] = useLocalStorage("restoku_menus", SEED_MENUS);
      const [stok, setStok] = useLocalStorage("restoku_stok", SEED_STOK);
      const [transaksi, setTransaksi] = useLocalStorage("restoku_transaksi", SEED_TRANSAKSI);
      const [notifikasi, setNotifikasi] = useState([]);

      const allBahan = useCallback(() => {
        const map = {};
        menus.forEach(m => m.bahan.forEach(b => {
          if (!map[b.bahan_id]) map[b.bahan_id] = { id: b.bahan_id, nama: b.nama, satuan: b.satuan };
        }));
        return map;
      }, [menus]);

      useEffect(() => {
        const kritis = Object.entries(stok)
          .filter(([, s]) => getStokPersen(s) < 30)
          .map(([id, s]) => ({ id, nama: s.nama, pct: getStokPersen(s) }));
        setNotifikasi(kritis);
      }, [stok]);

      const reduceStok = (items) => {
        setStok(prev => {
          const next = { ...prev };
          items.forEach(({ menu_id, qty }) => {
            const menu = menus.find(m => m.id === menu_id);
            if (!menu) return;
            menu.bahan.forEach(b => {
              if (next[b.bahan_id]) {
                next[b.bahan_id] = { ...next[b.bahan_id], stok_saat_ini: Math.max(0, next[b.bahan_id].stok_saat_ini - b.qty * qty) };
              }
            });
          });
          return next;
        });
      };

      const addTransaksi = (t) => { reduceStok(t.items); setTransaksi(prev => [t, ...prev]); };

      const tabItems = [
        { id: "dashboard", label: "Beranda", icon: "dashboard" },
        { id: "menu", label: "Menu", icon: "food" },
        { id: "stok", label: "Stok", icon: "stock" },
        { id: "kasir", label: "Kasir", icon: "cashier" },
      ];

      const notifCount = notifikasi.length;
      const tabTitles = { dashboard: "RestoKu", menu: "Manajemen Menu", stok: "Manajemen Stok", kasir: "Kasir" };

      return (
        <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", background: "#f5f6fa", minHeight: "100vh", display: "flex", justifyContent: "center" }}>
          <div style={{ width: "100%", maxWidth: 480, minHeight: "100vh", position: "relative", display: "flex", flexDirection: "column" }}>

            {/* TOPBAR */}
            <div style={{ background: "#fff", padding: "16px 20px 14px", borderBottom: "1px solid #eef0f6", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 1px 8px rgba(0,0,0,.05)" }}>
              <div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#6366f1", fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", marginBottom: 2 }}>RestoKu</div>
                <div style={{ fontSize: 20, fontWeight: 900, color: "#1a1d2e", lineHeight: 1.1 }}>{tabTitles[activeTab]}</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setShowNotif(!showNotif)}
                  style={{ position: "relative", width: 44, height: 44, borderRadius: 12, background: notifCount > 0 ? "#fff5f5" : "#f5f6fa", border: notifCount > 0 ? "1.5px solid #fecaca" : "1.5px solid #e4e6ef", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="bell" size={20} color={notifCount > 0 ? "#ef4444" : "#8b90b0"} />
                  {notifCount > 0 && <span style={{ position: "absolute", top: 6, right: 6, background: "#ef4444", color: "#fff", fontSize: 9, fontWeight: 800, borderRadius: "50%", width: 14, height: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>{notifCount}</span>}
                </button>
                <button onClick={() => setShowReset(true)}
                  style={{ width: 44, height: 44, borderRadius: 12, background: "#f5f6fa", border: "1.5px solid #e4e6ef", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="logout" size={18} color="#8b90b0" />
                </button>
              </div>
            </div>

            {/* NOTIF PANEL */}
            {showNotif && (
              <div style={{ background: "#fff", borderBottom: "1px solid #fecaca", padding: "14px 20px" }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: "#ef4444", marginBottom: 10, letterSpacing: 1, textTransform: "uppercase" }}>⚠ Stok Kritis</div>
                {notifCount === 0
                  ? <div style={{ fontSize: 14, color: "#10b981", fontWeight: 600 }}>✓ Semua stok aman</div>
                  : notifikasi.map(n => (
                    <div key={n.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#fff5f5", borderRadius: 10, marginBottom: 6, border: "1px solid #fecaca" }}>
                      <span style={{ fontSize: 14, color: "#991b1b", fontWeight: 700 }}>{n.nama}</span>
                      <span style={{ fontSize: 13, color: "#ef4444", fontWeight: 800, fontFamily: "'JetBrains Mono'" }}>{n.pct}%</span>
                    </div>
                  ))}
              </div>
            )}

            {/* RESET MODAL */}
            {showReset && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(26,29,46,.5)", backdropFilter: "blur(4px)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
                <div style={{ background: "#fff", borderRadius: 20, padding: 28, width: "100%", maxWidth: 340, boxShadow: "0 24px 64px rgba(0,0,0,.15)" }}>
                  <div style={{ fontSize: 20, fontWeight: 900, color: "#ef4444", marginBottom: 8 }}>⚠️ Reset Data?</div>
                  <div style={{ fontSize: 14, color: "#4b5280", marginBottom: 24, lineHeight: 1.7 }}>Semua data menu, stok, dan transaksi akan dihapus dan kembali ke data awal. Tindakan ini tidak bisa dibatalkan.</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => setShowReset(false)} style={{ flex: 1, padding: "14px", background: "#f5f6fa", border: "1.5px solid #e4e6ef", borderRadius: 12, color: "#4b5280", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Batal</button>
                    <button onClick={clearAllData} style={{ flex: 1, padding: "14px", background: "#ef4444", border: "none", borderRadius: 12, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Ya, Reset</button>
                  </div>
                </div>
              </div>
            )}

            {/* STORAGE INDICATOR */}
            <div style={{ background: "#f0f1f7", padding: "5px 20px", display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10b981" }} />
              <span style={{ fontSize: 10, color: "#8b90b0", fontFamily: "'JetBrains Mono'" }}>Data tersimpan di perangkat</span>
            </div>

            {/* CONTENT */}
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: "calc(var(--nav-h) + 8px)" }}>
              {activeTab === "dashboard" && <DashboardPage stok={stok} transaksi={transaksi} menus={menus} />}
              {activeTab === "menu" && <MenuPage menus={menus} setMenus={setMenus} stok={stok} setStok={setStok} allBahan={allBahan} />}
              {activeTab === "stok" && <StokPage stok={stok} setStok={setStok} allBahan={allBahan} />}
              {activeTab === "kasir" && <KasirPage menus={menus} addTransaksi={addTransaksi} stok={stok} />}
            </div>

            {/* BOTTOM NAV — Mobile */}
            <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "#fff", borderTop: "1px solid #eef0f6", display: "flex", zIndex: 100, padding: "8px 0 env(safe-area-inset-bottom, 8px)", boxShadow: "0 -4px 16px rgba(0,0,0,.06)" }}>
              {tabItems.map(t => {
                const active = activeTab === t.id;
                return (
                  <button key={t.id} onClick={() => setActiveTab(t.id)}
                    style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4, background: "none", border: "none", cursor: "pointer", padding: "6px 0 2px", minHeight: 56, position: "relative", WebkitTapHighlightColor: "transparent" }}>
                    <div style={{ width: 44, height: 30, borderRadius: 99, background: active ? "#eef0ff" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "background .2s" }}>
                      <Icon name={t.icon} size={22} color={active ? "#6366f1" : "#b0b4d0"} />
                    </div>
                    <span style={{ fontSize: 11, fontWeight: active ? 800 : 600, color: active ? "#6366f1" : "#b0b4d0", letterSpacing: 0.2, transition: "color .2s" }}>{t.label}</span>
                    {active && <div style={{ position: "absolute", bottom: 0, width: 24, height: 3, background: "#6366f1", borderRadius: "3px 3px 0 0" }} />}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─── DASHBOARD PAGE ───────────────────────────────────────────────────────────
    function DashboardPage({ stok, transaksi, menus }) {
      const today = new Date().toDateString();
      const todayTx = transaksi.filter(t => new Date(t.waktu).toDateString() === today);
      const totalHarian = todayTx.reduce((a, t) => a + t.total, 0);
      const totalSemua = transaksi.reduce((a, t) => a + t.total, 0);

      const menuCount = {};
      transaksi.forEach(t => t.items.forEach(i => {
        menuCount[i.nama] = (menuCount[i.nama] || 0) + i.qty;
      }));
      const terlaris = Object.entries(menuCount).sort((a, b) => b[1] - a[1]).slice(0, 3);

      const porsiData = menus.map(m => ({ ...m, porsi: hitungPorsi(m, stok), bottleneck: bottleneckBahan(m, stok) })).sort((a, b) => a.porsi - b.porsi);
      const totalPorsi = porsiData.reduce((a, m) => a + m.porsi, 0);
      const menuHabis = porsiData.filter(m => m.porsi === 0).length;
      const menuKritis = porsiData.filter(m => m.porsi > 0 && m.porsi <= 5).length;
      const stokKritis = Object.values(stok).filter(s => getStokPersen(s) < 30).length;

      const rankColors = ["#f59e0b", "#94a3b8", "#cd7c2f"];

      return (
        <div style={{ padding: "16px 16px 8px" }}>

          {/* HERO CARDS */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
            <div style={{ background: "linear-gradient(135deg, #6366f1 0%, #818cf8 100%)", borderRadius: 20, padding: "20px 16px", boxShadow: "0 8px 24px #6366f140" }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.75)", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Penjualan Hari Ini</div>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 4, lineHeight: 1.2 }}>{fmt(totalHarian)}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <div style={{ width: 18, height: 18, borderRadius: "50%", background: "rgba(255,255,255,.2)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon name="receipt" size={11} color="#fff" />
                </div>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,.8)", fontWeight: 600 }}>{todayTx.length} transaksi</span>
              </div>
            </div>
            <div style={{
              background: menuHabis > 0
                ? "linear-gradient(135deg, #ef4444 0%, #f87171 100%)"
                : menuKritis > 0
                ? "linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%)"
                : "linear-gradient(135deg, #10b981 0%, #34d399 100%)",
              borderRadius: 20, padding: "20px 16px",
              boxShadow: menuHabis > 0 ? "0 8px 24px #ef444440" : menuKritis > 0 ? "0 8px 24px #f59e0b40" : "0 8px 24px #10b98140"
            }}>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.75)", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Kapasitas</div>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 4 }}>{totalPorsi} porsi</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.8)", fontWeight: 600 }}>
                {menuHabis > 0 ? `⛔ ${menuHabis} menu habis` : menuKritis > 0 ? `⚠ ${menuKritis} hampir habis` : `✓ ${menus.length} menu ok`}
              </div>
            </div>
          </div>

          {/* STATS ROW */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
            {[
              { label: "Total Omzet", val: fmt(totalSemua), color: "#6366f1" },
              { label: "Stok Kritis", val: `${stokKritis} item`, color: stokKritis > 0 ? "#ef4444" : "#10b981" },
              { label: "Menu Aktif", val: `${menus.length} menu`, color: "#10b981" },
            ].map(s => (
              <Card key={s.label} style={{ padding: "14px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: s.color, marginBottom: 4, lineHeight: 1.2 }}>{s.val}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#8b90b0", lineHeight: 1.3 }}>{s.label}</div>
              </Card>
            ))}
          </div>

          {/* PORSI PER MENU */}
          <SectionTitle>🍽 Estimasi Porsi</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
            {porsiData.map(m => {
              const porsiMax = Math.max(...porsiData.map(x => x.porsi), 1);
              const pct = Math.round((m.porsi / porsiMax) * 100);
              const color = m.porsi === 0 ? "#ef4444" : m.porsi <= 5 ? "#f59e0b" : "#10b981";
              const bg = m.porsi === 0 ? "#fef2f2" : m.porsi <= 5 ? "#fffbeb" : "#ecfdf5";
              const textColor = m.porsi === 0 ? "#991b1b" : m.porsi <= 5 ? "#92400e" : "#065f46";
              const label = m.porsi === 0 ? "Habis" : m.porsi <= 5 ? "Hampir habis" : "Tersedia";
              return (
                <Card key={m.id} style={{ padding: "14px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 800, color: "#1a1d2e", marginBottom: 3 }}>{m.nama}</div>
                      <div style={{ fontSize: 11, color: "#8b90b0" }}>
                        {m.porsi === 0 ? `⛔ Kurang: ${m.bottleneck}` : m.porsi <= 5 ? `⚠ Hampir habis · ${m.bottleneck}` : `Bahan min: ${m.bottleneck}`}
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 22, fontWeight: 700, color, lineHeight: 1 }}>{m.porsi}</div>
                      <Badge text={label} color={textColor} bg={bg} />
                    </div>
                  </div>
                  <ProgressBar pct={pct} color={color} thin />
                </Card>
              );
            })}
          </div>

          {/* STOK STATUS */}
          <SectionTitle>📦 Status Stok</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
            {Object.entries(stok).map(([id, s]) => {
              const pct = getStokPersen(s);
              const w = getStokWarna(pct);
              return (
                <Card key={id} style={{ padding: "14px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: "#1a1d2e" }}>{s.nama}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Badge text={w.label} color={w.text} bg={w.light} />
                      <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, color: w.bg, fontWeight: 700 }}>{pct}%</span>
                    </div>
                  </div>
                  <ProgressBar pct={pct} color={w.bg} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                    <span style={{ fontSize: 11, color: "#4b5280", fontWeight: 600 }}>{fmtStokQty(s)}</span>
                    <span style={{ fontSize: 11, color: "#8b90b0" }}>dari {fmtStokQty(s, "stok_awal")}</span>
                  </div>
                </Card>
              );
            })}
          </div>

          {/* TERLARIS */}
          <SectionTitle>🔥 Menu Terlaris</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
            {terlaris.length === 0
              ? <EmptyState icon="food" text="Belum ada transaksi" />
              : terlaris.map(([nama, qty], i) => (
                <Card key={nama} style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 34, height: 34, background: rankColors[i] || "#e4e6ef", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono'", fontSize: 14, fontWeight: 700, color: "#fff", flexShrink: 0 }}>{i + 1}</div>
                  <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: "#1a1d2e" }}>{nama}</div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 14, color: "#6366f1", fontWeight: 700 }}>{qty}×</div>
                </Card>
              ))}
          </div>

          {/* TRANSAKSI TERAKHIR */}
          <SectionTitle>🧾 Transaksi Terakhir</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 8 }}>
            {transaksi.length === 0
              ? <EmptyState icon="receipt" text="Belum ada transaksi" />
              : transaksi.slice(0, 5).map(t => (
                <Card key={t.id} style={{ padding: "12px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 12, color: "#8b90b0", fontFamily: "'JetBrains Mono'" }}>{new Date(t.waktu).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" })}</span>
                    <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 14, fontWeight: 700, color: "#10b981" }}>{fmt(t.total)}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#4b5280", fontWeight: 600 }}>{t.items.map(i => `${i.nama} ×${i.qty}`).join(", ")}</div>
                </Card>
              ))}
          </div>
        </div>
      );
    }

    // ─── MENU PAGE ────────────────────────────────────────────────────────────────
    function MenuPage({ menus, setMenus, stok, setStok, allBahan }) {
      const [view, setView] = useState("list");
      const [editMenu, setEditMenu] = useState(null);
      const [hppView, setHppView] = useState(null);

      const deleteMenu = (id) => setMenus(prev => prev.filter(m => m.id !== id));
      const saveMenu = (menu) => {
        if (menu.id && menus.find(m => m.id === menu.id)) {
          setMenus(prev => prev.map(m => m.id === menu.id ? menu : m));
        } else {
          setMenus(prev => [...prev, { ...menu, id: "m" + uid() }]);
        }
        const newBahan = {};
        [...menus, menu].forEach(m => m.bahan.forEach(b => {
          if (!stok[b.bahan_id] && !newBahan[b.bahan_id]) {
            newBahan[b.bahan_id] = { nama: b.nama, stok_awal: 0, stok_saat_ini: 0, satuan: b.satuan, harga_beli_per_gram: 0, harga_beli_per_unit: 0, unit_qty: 1000 };
          }
        }));
        if (Object.keys(newBahan).length > 0) setStok(prev => ({ ...prev, ...newBahan }));
        setView("list");
        setEditMenu(null);
      };

      if (hppView) return <HppView menu={hppView} stok={stok} onBack={() => setHppView(null)} />;
      if (view === "form") return <MenuForm menu={editMenu} stok={stok} onSave={saveMenu} onBack={() => { setView("list"); setEditMenu(null); }} />;

      const kategoris = [...new Set(menus.map(m => m.kategori))];

      return (
        <div style={{ padding: "16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#8b90b0" }}>{menus.length} menu terdaftar</span>
            <button onClick={() => { setEditMenu(null); setView("form"); }} style={btnPrimary()}>
              <Icon name="plus" size={18} color="#fff" /> Tambah Menu
            </button>
          </div>

          {kategoris.map(kat => (
            <div key={kat} style={{ marginBottom: 24 }}>
              <SectionTitle>{kat}</SectionTitle>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {menus.filter(m => m.kategori === kat).map(menu => {
                  const hpp = calcHPP(menu, stok);
                  const margin = menu.harga_jual > 0 ? Math.round(((menu.harga_jual - hpp.hpp_total) / menu.harga_jual) * 100) : 0;
                  return (
                    <Card key={menu.id} style={{ padding: "16px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div>
                          <div style={{ fontSize: 16, fontWeight: 800, color: "#1a1d2e", marginBottom: 4 }}>{menu.nama}</div>
                          <div style={{ fontSize: 12, color: "#8b90b0" }}>{menu.bahan.length} bahan · HPP {fmt(hpp.hpp_total)}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 16, fontWeight: 700, color: "#10b981" }}>{fmt(menu.harga_jual)}</div>
                          <Badge text={`${margin}% margin`} color={margin >= 20 ? "#065f46" : "#92400e"} bg={margin >= 20 ? "#ecfdf5" : "#fffbeb"} />
                        </div>
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                        {menu.bahan.map(b => (
                          <span key={b.bahan_id} style={{ fontSize: 11, background: "#f5f6fa", color: "#4b5280", padding: "4px 10px", borderRadius: 20, border: "1px solid #e4e6ef", fontWeight: 600 }}>
                            {b.nama} {b.qty}{b.satuan}
                          </span>
                        ))}
                      </div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={() => setHppView(menu)} style={{ ...btnSecondary, fontSize: 12, padding: "10px 14px", minHeight: 40 }}>
                          <Icon name="trending" size={14} color="#6366f1" /> HPP
                        </button>
                        <button onClick={() => { setEditMenu(menu); setView("form"); }} style={{ ...btnSecondary, fontSize: 12, padding: "10px 14px", minHeight: 40 }}>
                          <Icon name="edit" size={14} color="#4b5280" /> Edit
                        </button>
                        <button onClick={() => deleteMenu(menu.id)} style={{ ...btnDanger, fontSize: 12, padding: "10px 14px", minHeight: 40 }}>
                          <Icon name="trash" size={14} color="#ef4444" /> Hapus
                        </button>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function MenuForm({ menu, stok, onSave, onBack }) {
      const [nama, setNama] = useState(menu?.nama || "");
      const [kategori, setKategori] = useState(menu?.kategori || "Makanan");
      const [harga, setHarga] = useState(menu?.harga_jual || "");
      const [bahan, setBahan] = useState(menu?.bahan || [{ bahan_id: "b" + uid(), nama: "", qty: "", satuan: "gram" }]);
      const [biaya, setBiaya] = useState(menu?.biaya_tambahan || { listrik: 500, gas: 300, air: 100, labor: 2000 });

      const bahanExisting = Object.entries(stok || {}).map(([id, s]) => ({ bahan_id: id, nama: s.nama, satuan: s.satuan }));
      const addBahan = () => setBahan(prev => [...prev, { bahan_id: "b" + uid(), nama: "", qty: "", satuan: "gram", isNew: true }]);
      const removeBahan = (i) => setBahan(prev => prev.filter((_, idx) => idx !== i));
      const updateBahan = (i, field, val) => setBahan(prev => prev.map((b, idx) => idx === i ? { ...b, [field]: val } : b));
      const pilihBahanExisting = (i, bahanId) => {
        if (!bahanId) return;
        const found = bahanExisting.find(b => b.bahan_id === bahanId);
        if (!found) return;
        setBahan(prev => prev.map((b, idx) => idx === i ? { ...b, bahan_id: found.bahan_id, nama: found.nama, satuan: found.satuan, isNew: false } : b));
      };
      const handleSave = () => {
        if (!nama || bahan.some(b => !b.nama || !b.qty)) return alert("Lengkapi semua field!");
        onSave({ ...menu, nama, kategori, harga_jual: Number(harga), bahan: bahan.map(b => ({ ...b, qty: Number(b.qty) })), biaya_tambahan: biaya });
      };

      return (
        <div style={{ padding: "16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, background: "#f5f6fa", border: "1.5px solid #e4e6ef", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="arrow_back" size={20} color="#4b5280" />
            </button>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1a1d2e" }}>{menu ? "Edit Menu" : "Tambah Menu Baru"}</div>
          </div>

          <Card style={{ marginBottom: 16, padding: "18px" }}>
            <FormGroup label="Nama Menu"><input value={nama} onChange={e => setNama(e.target.value)} placeholder="Ayam Geprek..." style={inputStyle} /></FormGroup>
            <FormGroup label="Kategori">
              <select value={kategori} onChange={e => setKategori(e.target.value)} style={inputStyle}>
                {["Makanan", "Minuman", "Snack", "Paket"].map(k => <option key={k}>{k}</option>)}
              </select>
            </FormGroup>
            <FormGroup label="Harga Jual (Rp)" style={{ marginBottom: 0 }}>
              <input type="number" value={harga} onChange={e => setHarga(e.target.value)} placeholder="15000" style={inputStyle} />
            </FormGroup>
          </Card>

          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: "#1a1d2e" }}>Daftar Bahan</div>
              <button onClick={addBahan} style={{ ...btnSecondary, fontSize: 12, padding: "10px 14px", minHeight: 40 }}>
                <Icon name="plus" size={14} color="#6366f1" /> Tambah
              </button>
            </div>
            {bahan.map((b, i) => {
              const isExisting = bahanExisting.some(e => e.bahan_id === b.bahan_id);
              return (
                <Card key={i} style={{ marginBottom: 10, padding: "14px", border: isExisting ? "1.5px solid #d1fae5" : "1.5px solid #e4e6ef" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <Badge text={isExisting ? "✓ Dari stok" : "✦ Bahan baru"} color={isExisting ? "#065f46" : "#4f51c8"} bg={isExisting ? "#ecfdf5" : "#eef0ff"} />
                    <button onClick={() => removeBahan(i)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, borderRadius: 8 }}>
                      <Icon name="close" size={18} color="#8b90b0" />
                    </button>
                  </div>
                  {bahanExisting.length > 0 && (
                    <FormGroup label="Pilih dari stok">
                      <select value={isExisting ? b.bahan_id : ""} onChange={e => pilihBahanExisting(i, e.target.value)} style={inputStyle}>
                        <option value="">-- atau tulis manual --</option>
                        {bahanExisting.map(e => <option key={e.bahan_id} value={e.bahan_id}>{e.nama} ({e.satuan})</option>)}
                      </select>
                    </FormGroup>
                  )}
                  <FormGroup label="Nama bahan">
                    <input value={b.nama} onChange={e => updateBahan(i, "nama", e.target.value)} placeholder="Nama bahan baru..." style={{ ...inputStyle, opacity: isExisting ? .5 : 1 }} />
                  </FormGroup>
                  <div style={{ display: "flex", gap: 10 }}>
                    <FormGroup label="Jumlah" style={{ flex: 1, marginBottom: 0 }}>
                      <input type="number" value={b.qty} onChange={e => updateBahan(i, "qty", e.target.value)} placeholder="0" style={inputStyle} />
                    </FormGroup>
                    <FormGroup label="Satuan" style={{ flex: 1, marginBottom: 0 }}>
                      <select value={b.satuan} onChange={e => updateBahan(i, "satuan", e.target.value)} style={inputStyle}>
                        {["gram", "ml", "kg", "liter", "pcs"].map(s => <option key={s}>{s}</option>)}
                      </select>
                    </FormGroup>
                  </div>
                </Card>
              );
            })}
          </div>

          <Card style={{ marginBottom: 20, padding: "16px" }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: "#4b5280", marginBottom: 14, textTransform: "uppercase", letterSpacing: 1 }}>Biaya Tambahan (per porsi)</div>
            {Object.entries(biaya).map(([k, v]) => (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <label style={{ fontSize: 14, color: "#4b5280", fontWeight: 600, textTransform: "capitalize" }}>{k}</label>
                <input type="number" value={v} onChange={e => setBiaya(p => ({ ...p, [k]: Number(e.target.value) }))}
                  style={{ ...inputStyle, width: 110, textAlign: "right" }} />
              </div>
            ))}
          </Card>

          <button onClick={handleSave} style={{ ...btnPrimary(), width: "100%", justifyContent: "center" }}>
            <Icon name="check" size={18} color="#fff" /> Simpan Menu
          </button>
        </div>
      );
    }

    function HppView({ menu, stok, onBack }) {

      const margins = [10, 20, 30];
      return (
        <div style={{ padding: "16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
            <button onClick={onBack} style={{ width: 40, height: 40, borderRadius: 12, background: "#f5f6fa", border: "1.5px solid #e4e6ef", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="arrow_back" size={20} color="#4b5280" />
            </button>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1a1d2e" }}>HPP · {menu.nama}</div>
          </div>

          <Card style={{ marginBottom: 16, padding: "18px" }}>
            <SectionTitle>💰 Rincian Biaya Bahan</SectionTitle>
            {menu.bahan.map(b => {
              const s = stok[b.bahan_id];
              const biaya = s ? Math.round(b.qty * (s.satuan === "pcs" ? (s.harga_beli_per_pcs || 0) : (s.harga_beli_per_gram || 0))) : 0;
              return (
                <div key={b.bahan_id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid #f0f1f7" }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1d2e" }}>{b.nama}</div>
                    <div style={{ fontSize: 12, color: "#8b90b0" }}>
                      {b.satuan === "pcs" ? `${b.qty} pcs × ${fmt(s?.harga_beli_per_pcs || 0)}/pcs` : `${b.qty}${b.satuan} × ${fmt((s?.harga_beli_per_gram || 0) * 1000)}/kg`}
                    </div>
                  </div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 14, fontWeight: 700, color: "#4b5280" }}>{fmt(biaya)}</div>
                </div>
              );
            })}
            <div style={{ marginTop: 14, padding: "12px 0 0" }}>
              {[["Total Bahan", fmt(hpp.hpp_bahan)], ...Object.entries(menu.biaya_tambahan).map(([k, v]) => [`+ ${k.charAt(0).toUpperCase() + k.slice(1)}`, fmt(v)])].map(([l, v]) => (
                <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, color: "#8b90b0" }}>{l}</span>
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, fontWeight: 600, color: "#4b5280" }}>{v}</span>
                </div>
              ))}
              <div style={{ height: 1, background: "#e4e6ef", margin: "12px 0" }} />
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 15, fontWeight: 800, color: "#1a1d2e" }}>HPP Total</span>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 16, fontWeight: 800, color: "#6366f1" }}>{fmt(hpp.hpp_total)}</span>
              </div>

          </Card>

          <SectionTitle>📈 Rekomendasi Harga Jual</SectionTitle>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            {margins.map(m => (
              <Card key={m} style={{ padding: "16px 10px", textAlign: "center", border: m === 20 ? "2px solid #6366f1" : "1.5px solid #e4e6ef" }}>
                <div style={{ fontSize: 22, fontWeight: 900, color: m === 20 ? "#6366f1" : "#1a1d2e", marginBottom: 2 }}>{m}%</div>
                <div style={{ fontSize: 11, color: "#8b90b0", marginBottom: 6, fontWeight: 600 }}>Margin</div>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, fontWeight: 700, color: "#10b981" }}>{fmt(Math.round(hpp.hpp_total / (1 - m / 100)))}</div>

    // ─── STOK PAGE ────────────────────────────────────────────────────────────────
    const UNIT_KONVERSI = { "gram": 1, "kg": 1000, "ml": 1, "liter": 1000, "pcs": 1, "lusin (12)": 12, "kodi (20)": 20, "gross (144)": 144 };

    function StokPage({ stok, setStok, allBahan }) {
      const [selected, setSelected] = useState("");
      const [inputQty, setInputQty] = useState("");
      const [inputUnit, setInputUnit] = useState("gram");
      const [hargaBeli, setHargaBeli] = useState("");
      const [editId, setEditId] = useState(null);
      const [editVal, setEditVal] = useState("");
      const [editMax, setEditMax] = useState("");
      const bahan = allBahan();

      const toDisplayVal = (s, field) => {
        const qty = s[field] || 0;
        if (s.satuan === "pcs") return String(qty);
        return qty >= 1000 ? String((qty / 1000).toFixed(3)) : String(qty);
      };
      const toBaseDasar = (s, val) => {
        const num = parseFloat(val);
        if (s.satuan === "pcs") return num;
        return (s.stok_awal >= 1000 || s.stok_saat_ini >= 1000) ? num * 1000 : num;
      };

      const handleEditStok = (id) => {
        const s = stok[id];
        setEditVal(toDisplayVal(s, "stok_saat_ini"));
        setEditMax(toDisplayVal(s, "stok_awal"));
        setEditId(id);
      };
      const handleSaveEdit = (id) => {
        const s = stok[id];
        const vT = parseFloat(editVal), vM = parseFloat(editMax);
        if (isNaN(vT) || vT < 0) return alert("Stok tersedia tidak valid!");
        if (isNaN(vM) || vM <= 0) return alert("Stok maksimal harus lebih dari 0!");
        if (vT > vM) return alert("Stok tersedia tidak boleh melebihi maksimal!");
        setStok(prev => ({ ...prev, [id]: { ...prev[id], stok_saat_ini: toBaseDasar(s, editVal), stok_awal: toBaseDasar(s, editMax) } }));
        setEditId(null); setEditVal(""); setEditMax("");
      };
      const handleCancelEdit = () => { setEditId(null); setEditVal(""); setEditMax(""); };

      const selectedStok = stok[selected];
      const satuanDasar = selectedStok?.satuan || (bahan[selected]?.satuan === "pcs" ? "pcs" : "gram");
      const isPcs = satuanDasar === "pcs";
      const unitOptions = isPcs ? ["pcs", "lusin (12)", "kodi (20)", "gross (144)"] : satuanDasar === "ml" ? ["ml", "liter"] : ["gram", "kg"];

      const handleSelectBahan = (id) => {
        setSelected(id);
        const s = stok[id];
        const dasar = s?.satuan || bahan[id]?.satuan || "gram";
        setInputUnit(dasar === "pcs" ? "pcs" : dasar === "ml" ? "ml" : "gram");
        setHargaBeli(s?.harga_beli_per_unit?.toString() || "");
        setInputQty("");
      };
      const handleTambahStok = () => {
        if (!selected || !inputQty || !hargaBeli) return alert("Lengkapi semua field!");
        const konversi = UNIT_KONVERSI[inputUnit] || 1;
        const qtyDasar = Number(inputQty) * konversi;
        const hargaPerDasar = isPcs ? Number(hargaBeli) / konversi : Number(hargaBeli) / (Number(inputQty) * konversi);
        setStok(prev => ({
          ...prev,
          [selected]: {
            ...prev[selected],
            nama: bahan[selected]?.nama || selected,
            satuan: satuanDasar,
            stok_awal: (prev[selected]?.stok_awal || 0) + qtyDasar,
            stok_saat_ini: (prev[selected]?.stok_saat_ini || 0) + qtyDasar,
            ...(isPcs ? { harga_beli_per_pcs: Number(hargaBeli) / konversi, harga_beli_per_unit: Number(hargaBeli), unit_nama: inputUnit, unit_qty: konversi }
              : { harga_beli_per_gram: hargaPerDasar, harga_beli_per_unit: Number(hargaBeli), unit_nama: inputUnit, unit_qty: konversi }),
          }
        }));
        setInputQty(""); setHargaBeli(""); setSelected("");
      };
      const previewHarga = () => {
        if (!inputQty || !hargaBeli) return null;
        const konversi = UNIT_KONVERSI[inputUnit] || 1;
        if (isPcs) return `= ${fmt(Number(hargaBeli) / konversi)} / pcs`;
        return `= ${fmt(Number(hargaBeli) / (Number(inputQty) * konversi) * 1000)} / kg`;
      };

      return (
        <div style={{ padding: "16px" }}>
          <Card style={{ marginBottom: 20, padding: "18px" }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#6366f1", marginBottom: 16, letterSpacing: 0.5 }}>📦 Tambah / Update Stok</div>
            <FormGroup label="Pilih Bahan">
              <select value={selected} onChange={e => handleSelectBahan(e.target.value)} style={inputStyle}>
                <option value="">-- Pilih bahan dari menu --</option>
                {Object.entries(bahan).map(([id, b]) => <option key={id} value={id}>{b.nama} {b.satuan === "pcs" ? "🥚 pcs" : `(${b.satuan})`}</option>)}
              </select>
            </FormGroup>
            {selected && (
              <>
                <div style={{ background: isPcs ? "#eef0ff" : "#ecfdf5", borderRadius: 10, padding: "10px 14px", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 13, color: isPcs ? "#4f51c8" : "#065f46", fontWeight: 600 }}>
                    {isPcs ? "🥚 Bahan dihitung per pcs" : `⚖️ Bahan dihitung per ${satuanDasar}`}
                  </span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 4 }}>
                  <FormGroup label="Jumlah Beli" style={{ marginBottom: 0 }}>
                    <input type="number" value={inputQty} onChange={e => setInputQty(e.target.value)} placeholder="0" style={inputStyle} />
                  </FormGroup>
                  <FormGroup label="Satuan" style={{ marginBottom: 0 }}>
                    <select value={inputUnit} onChange={e => setInputUnit(e.target.value)} style={inputStyle}>
                      {unitOptions.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </FormGroup>
                </div>
                <FormGroup label={`Harga Beli Total (Rp) per ${inputUnit}`}>
                  <input type="number" value={hargaBeli} onChange={e => setHargaBeli(e.target.value)} placeholder={isPcs ? "50000 (1 kodi)" : "30000"} style={inputStyle} />
                </FormGroup>
                {previewHarga() && (
                  <div style={{ background: "#ecfdf5", borderRadius: 10, padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 13, color: "#4b5280" }}>Otomatis dihitung:</span>
                    <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, fontWeight: 700, color: "#10b981" }}>{previewHarga()}</span>
                  </div>
                )}
                <button onClick={handleTambahStok} style={{ ...btnPrimary(), width: "100%", justifyContent: "center" }}>
                  <Icon name="plus" size={18} color="#fff" /> Update Stok
                </button>
              </>
            )}
          </Card>

          <SectionTitle>📊 Daftar Stok Bahan</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {Object.entries(stok).map(([id, s]) => {
              const pct = getStokPersen(s);
              const w = getStokWarna(pct);
              const isEditing = editId === id;
              const displayUnit = s.satuan === "pcs" ? "pcs" : (s.stok_awal >= 1000 || s.stok_saat_ini >= 1000) ? (s.satuan === "gram" ? "kg" : "L") : s.satuan;
              return (
                <Card key={id} style={{ padding: "16px", border: isEditing ? "1.5px solid #6366f1" : "1.5px solid transparent", transition: "border .2s" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                        <div style={{ fontSize: 15, fontWeight: 800, color: "#1a1d2e" }}>{s.nama}</div>
                        {s.satuan === "pcs" && <Badge text="PCS" color="#4f51c8" bg="#eef0ff" />}
                      </div>
                      <div style={{ fontSize: 12, color: "#8b90b0" }}>{fmtHargaPerUnit(s)} · Nilai: {fmt(nilaiStok(s))}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 16, fontWeight: 700, color: w.bg }}>{pct}%</div>
                      <Badge text={w.label} color={w.text} bg={w.light} />
                    </div>
                  </div>
                  <ProgressBar pct={pct} color={w.bg} />

                  {isEditing ? (
                    <div style={{ marginTop: 14 }}>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                        <FormGroup label="Stok Tersedia" style={{ marginBottom: 0 }}>
                          <div style={{ position: "relative" }}>
                            <input type="number" value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus
                              style={{ ...inputStyle, paddingRight: 48, fontFamily: "'JetBrains Mono'", fontWeight: 700, border: "1.5px solid #6366f1" }} />
                            <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 12, color: "#6366f1", fontWeight: 700 }}>{displayUnit}</span>
                          </div>
                        </FormGroup>
                        <FormGroup label="Stok Maksimal" style={{ marginBottom: 0 }}>
                          <div style={{ position: "relative" }}>
                            <input type="number" value={editMax} onChange={e => setEditMax(e.target.value)}
                              style={{ ...inputStyle, paddingRight: 48, fontFamily: "'JetBrains Mono'", fontWeight: 700 }} />
                            <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 12, color: "#8b90b0", fontWeight: 700 }}>{displayUnit}</span>
                          </div>
                        </FormGroup>
                      </div>
                      {editVal && editMax && parseFloat(editMax) > 0 && parseFloat(editVal) <= parseFloat(editMax) && (
                        <div style={{ background: "#ecfdf5", borderRadius: 10, padding: "8px 14px", marginBottom: 12, display: "flex", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 12, color: "#4b5280" }}>Preview:</span>
                          <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, fontWeight: 700, color: "#10b981" }}>
                            {Math.round((parseFloat(editVal) / parseFloat(editMax)) * 100)}%
                          </span>
                        </div>
                      )}
                      <div style={{ display: "flex", gap: 10 }}>
                        <button onClick={() => handleSaveEdit(id)} style={{ ...btnPrimary("#10b981"), flex: 1, justifyContent: "center", padding: "12px" }}>
                          <Icon name="check" size={16} color="#fff" /> Simpan
                        </button>
                        <button onClick={handleCancelEdit} style={{ ...btnSecondary, padding: "12px 16px" }}>
                          <Icon name="close" size={16} color="#4b5280" />
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                      <div>
                        <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, color: "#1a1d2e", fontWeight: 700 }}>{fmtStokQty(s)}</span>
                        <span style={{ fontSize: 12, color: "#8b90b0" }}> / {fmtStokQty(s, "stok_awal")}</span>
                      </div>
                      <button onClick={() => handleEditStok(id)} style={{ ...btnSecondary, fontSize: 12, padding: "10px 14px", minHeight: 40 }}>
                        <Icon name="edit" size={14} color="#6366f1" /> Edit Stok
                      </button>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── KASIR PAGE ───────────────────────────────────────────────────────────────
    function KasirPage({ menus, addTransaksi, stok }) {
      const [cart, setCart] = useState([]);
      const [bayar, setBayar] = useState("");
      const [sukses, setSukses] = useState(false);
      const [activeKat, setActiveKat] = useState(null);

      const total = cart.reduce((a, i) => a + i.harga * i.qty, 0);
      const kembalian = Number(bayar) - total;
      const kategoris = [...new Set(menus.map(m => m.kategori))];
      const katActive = activeKat || kategoris[0];

      const addToCart = (menu) => {
        setCart(prev => {
          const found = prev.find(i => i.menu_id === menu.id);
          if (found) return prev.map(i => i.menu_id === menu.id ? { ...i, qty: i.qty + 1 } : i);
          return [...prev, { menu_id: menu.id, nama: menu.nama, harga: menu.harga_jual, qty: 1 }];
        });
      };
      const changeQty = (menu_id, delta) => {
        setCart(prev => prev.map(i => i.menu_id === menu_id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0));
      };
      const handleBayar = () => {
        if (cart.length === 0) return alert("Keranjang kosong!");
        if (Number(bayar) < total) return alert("Bayar kurang!");
        addTransaksi({ id: "t" + uid(), waktu: new Date().toISOString(), items: cart, total, bayar: Number(bayar), kembalian });
        setSukses(true);
        setTimeout(() => { setSukses(false); setCart([]); setBayar(""); }, 3000);
      };

      if (sukses) {
        return (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", gap: 16, padding: 24 }}>
            <div style={{ width: 88, height: 88, background: "#ecfdf5", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", border: "3px solid #d1fae5" }}>
              <Icon name="check" size={44} color="#10b981" />
            </div>
            <div style={{ fontSize: 24, fontWeight: 900, color: "#10b981" }}>Berhasil!</div>
            <div style={{ fontSize: 16, color: "#4b5280", fontWeight: 600 }}>Total: {fmt(total)}</div>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 18, fontWeight: 700, color: "#6366f1" }}>Kembalian: {fmt(Math.max(0, kembalian))}</div>
            <div style={{ fontSize: 12, color: "#8b90b0" }}>Stok otomatis diperbarui ✓</div>
          </div>
        );
      }

      return (
        <div>
          {/* KATEGORI TABS */}
          <div style={{ display: "flex", gap: 8, padding: "12px 16px 8px", overflowX: "auto", borderBottom: "1px solid #eef0f6" }}>
            {kategoris.map(kat => (
              <button key={kat} onClick={() => setActiveKat(kat)}
                style={{ flexShrink: 0, padding: "8px 16px", borderRadius: 99, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700,
                  background: katActive === kat ? "#6366f1" : "#f0f1f7",
                  color: katActive === kat ? "#fff" : "#4b5280",
                  boxShadow: katActive === kat ? "0 4px 12px #6366f140" : "none",
                  transition: "all .2s", minHeight: 40 }}>
                {kat}
              </button>
            ))}
          </div>

          {/* MENU GRID */}
          <div style={{ padding: "12px 16px 8px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {menus.filter(m => m.kategori === katActive).map(menu => {
                const inCart = cart.find(i => i.menu_id === menu.id);
                return (
                  <button key={menu.id} onClick={() => addToCart(menu)}
                    style={{ background: inCart ? "#f0f0ff" : "#fff", border: inCart ? "2px solid #6366f1" : "1.5px solid #e4e6ef", borderRadius: 16, padding: "16px 14px", textAlign: "left", cursor: "pointer", position: "relative", boxShadow: inCart ? "0 4px 12px #6366f120" : "0 1px 4px rgba(0,0,0,.05)", transition: "all .15s", minHeight: 80 }}>
                    {inCart && (
                      <div style={{ position: "absolute", top: 10, right: 10, background: "#6366f1", color: "#fff", fontSize: 11, fontWeight: 800, borderRadius: 20, padding: "2px 8px" }}>{inCart.qty}×</div>
                    )}
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#1a1d2e", marginBottom: 6, lineHeight: 1.3, paddingRight: inCart ? 32 : 0 }}>{menu.nama}</div>
                    <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 14, fontWeight: 700, color: "#10b981" }}>{fmt(menu.harga_jual)}</div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* CART */}
          {cart.length > 0 && (
            <div style={{ background: "#fff", borderTop: "1px solid #eef0f6", padding: "16px", margin: "12px 0 0" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: "#8b90b0", marginBottom: 12, letterSpacing: 1, textTransform: "uppercase" }}>🛒 Pesanan ({cart.length} item)</div>
              {cart.map(item => (
                <div key={item.menu_id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, padding: "8px 0", borderBottom: "1px solid #f0f1f7" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1d2e" }}>{item.nama}</div>
                    <div style={{ fontSize: 12, color: "#8b90b0" }}>{fmt(item.harga)}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, fontWeight: 700, color: "#10b981" }}>{fmt(item.harga * item.qty)}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#f5f6fa", borderRadius: 99, padding: "4px 8px" }}>
                      <button onClick={() => changeQty(item.menu_id, -1)} style={{ width: 28, height: 28, borderRadius: "50%", background: "#fff", border: "1px solid #e4e6ef", cursor: "pointer", color: "#4b5280", fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                      <span style={{ fontSize: 14, fontWeight: 800, color: "#1a1d2e", minWidth: 20, textAlign: "center" }}>{item.qty}</span>
                      <button onClick={() => changeQty(item.menu_id, 1)} style={{ width: 28, height: 28, borderRadius: "50%", background: "#6366f1", border: "none", cursor: "pointer", color: "#fff", fontSize: 16, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                    </div>
                  </div>
                </div>
              ))}

              <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 0 16px", alignItems: "center" }}>
                <span style={{ fontSize: 16, fontWeight: 800, color: "#1a1d2e" }}>Total</span>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 20, fontWeight: 900, color: "#6366f1" }}>{fmt(total)}</span>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
                <FormGroup label="Bayar (Rp)" style={{ marginBottom: 0 }}>
                  <input type="number" value={bayar} onChange={e => setBayar(e.target.value)} placeholder={total.toString()}
                    style={{ ...inputStyle, fontFamily: "'JetBrains Mono'", fontWeight: 700 }} />
                </FormGroup>
                <FormGroup label="Kembalian" style={{ marginBottom: 0 }}>
                  <div style={{ background: "#f8f9fe", borderRadius: 12, padding: "14px 16px", fontFamily: "'JetBrains Mono'", fontSize: 15, fontWeight: 700, color: kembalian >= 0 && bayar ? "#10b981" : "#ef4444", border: "1.5px solid #e4e6ef", minHeight: 54, display: "flex", alignItems: "center" }}>
                    {bayar ? fmt(Math.max(0, kembalian)) : "—"}
                  </div>
                </FormGroup>
              </div>

              <button onClick={handleBayar} style={{ ...btnPrimary("#10b981"), width: "100%", justifyContent: "center" }}>
                <Icon name="check" size={20} color="#fff" /> Proses Pembayaran
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      const isProd = !location.hostname.includes('claudeusercontent.com') &&
                     location.hostname !== 'localhost' &&
                     !location.hostname.includes('127.0.0.1');
      if (isProd) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(() => console.log('[RestoKu] Offline mode aktif ✓'))
            .catch(e => console.warn('[RestoKu] SW gagal:', e.message));
        });
      }
    }
  </script>
</body>
</html>
