// ─── STORAGE ──────────────────────────────────────────────────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
  });
  const set = (v) => {
    try { const nv = v instanceof Function ? v(val) : v; setVal(nv); localStorage.setItem(key, JSON.stringify(nv)); } catch {}
  };
  return [val, set];
}

  location.reload();
}

// Hitung HPP satu komponen (rekursif untuk nested)
function hppKomponen(koId, komponen, bahan, visited = new Set()) {
  if (visited.has(koId)) return 0; // cegah circular
  visited.add(koId);
  const ko = komponen.find(k => k.id === koId);
  if (!ko) return 0;
  let total = 0;
  ko.detail.forEach(d => {
    if (d.tipe === "bahan") {
      const b = bahan.find(x => x.id === d.item_id);
      total += b ? d.qty * b.harga_per_satuan : 0;
    } else if (d.tipe === "komponen") {
      const subHpp = hppKomponen(d.item_id, komponen, bahan, new Set(visited));
      total += subHpp * d.qty;
    }
  });
  // Divide by yield
  const yieldPorsi = ko.yield_mode === "batch" ? (ko.yield_porsi || 1) : 1;
  return total / yieldPorsi;
}

// Hitung HPP produk = sum(hpp_komponen * qty) + biaya_ops
function hppProduk(produk, komponen, bahan, biayaOps) {
  let hpp_komponen = 0;
  produk.komposisi.forEach(k => {
    if (k.tipe === "komponen") {
      hpp_komponen += hppKomponen(k.item_id, komponen, bahan) * k.qty;
    } else if (k.tipe === "bahan") {
      const b = bahan.find(x => x.id === k.item_id);
      hpp_komponen += b ? k.qty * b.harga_per_satuan : 0;
    }
  });
  const ops = Object.values(biayaOps).reduce((a,b)=>a+Number(b),0);
  return { hpp_komponen: Math.round(hpp_komponen), ops, hpp_total: Math.round(hpp_komponen + ops) };
}

// Hitung berapa porsi produk bisa dibuat dari stok saat ini
function hitungPorsiProduk(produk, komponen, bahan) {
  // Kumpulkan kebutuhan bahan total per porsi produk
  const kebutuhan = {}; // bahan_id → qty_per_porsi
  function collectBahan(detail, multiplier, visited) {
    detail.forEach(d => {
      if (d.tipe === "bahan") {
        kebutuhan[d.item_id] = (kebutuhan[d.item_id] || 0) + d.qty * multiplier;
      } else if (d.tipe === "komponen" && !visited.has(d.item_id)) {
        const ko = komponen.find(k => k.id === d.item_id);
        if (!ko) return;
        const yp = ko.yield_mode === "batch" ? (ko.yield_porsi || 1) : 1;
        const newVisited = new Set(visited); newVisited.add(d.item_id);
        collectBahan(ko.detail, multiplier * d.qty / yp, newVisited);
      }
    });
  }
  produk.komposisi.forEach(k => {
    if (k.tipe === "komponen") {
      const ko = komponen.find(x => x.id === k.item_id);
      if (!ko) return;
      const yp = ko.yield_mode === "batch" ? (ko.yield_porsi || 1) : 1;
      collectBahan(ko.detail, k.qty / yp, new Set([k.item_id]));
    } else if (k.tipe === "bahan") {
      kebutuhan[k.item_id] = (kebutuhan[k.item_id] || 0) + k.qty;
    }
  });
  let min = Infinity;
  Object.entries(kebutuhan).forEach(([bid, qpp]) => {
    const b = bahan.find(x => x.id === bid);
    if (!b || qpp <= 0) return;
    const p = Math.floor(b.stok_saat_ini / qpp);
    if (p < min) min = p;
  });
  return { porsi: min === Infinity ? 0 : min, kebutuhan };
}

// Kurangi stok bahan saat transaksi
function kurangStokBahan(produkList, bahan, komponen, setBahan) {
  // produkList: [{produk_id, qty}]
  const pengurangan = {}; // bahan_id → total qty dikurangi
  produkList.forEach(({ produk_id, qty, produk_obj }) => {
    const pr = produk_obj;
    if (!pr) return;
    function collectBahan(detail, multiplier, visited) {
      detail.forEach(d => {
        if (d.tipe === "bahan") {
          pengurangan[d.item_id] = (pengurangan[d.item_id] || 0) + d.qty * multiplier;
        } else if (d.tipe === "komponen" && !visited.has(d.item_id)) {
          const ko = komponen.find(k => k.id === d.item_id);
          if (!ko) return;
          const yp = ko.yield_mode === "batch" ? (ko.yield_porsi || 1) : 1;
          const nv = new Set(visited); nv.add(d.item_id);
          collectBahan(ko.detail, multiplier * d.qty / yp, nv);
        }
      });
    }
    pr.komposisi.forEach(k => {
      if (k.tipe === "komponen") {
        const ko = komponen.find(x => x.id === k.item_id);
        if (!ko) return;
        const yp = ko.yield_mode === "batch" ? (ko.yield_porsi || 1) : 1;
        collectBahan(ko.detail, qty * k.qty / yp, new Set([k.item_id]));
      } else if (k.tipe === "bahan") {
        pengurangan[k.item_id] = (pengurangan[k.item_id] || 0) + k.qty * qty;
      }
    });
  });
  setBahan(prev => prev.map(b => ({
    ...b,
    stok_saat_ini: Math.max(0, b.stok_saat_ini - (pengurangan[b.id] || 0))
  })));
}

function getWarna(pct) {
  if (pct >= 70) return { bg:"#22c55e", text:"#15803d", light:"#dcfce7", label:"Aman" };
  if (pct >= 30) return { bg:"#f59e0b", text:"#b45309", light:"#fef3c7", label:"Warning" };
  return { bg:"#ef4444", text:"#b91c1c", light:"#fee2e2", label:"Kritis" };
}

              <Icon name="logout" size={20} color="#4b5563"/>
            </button>

          <div style={{background:"#1a1a2e",borderBottom:"1px solid #2a2a3e",padding:"12px 20px"}}>

            {notif.length===0?<div style={{fontSize:13,color:"#6b7280"}}>Semua stok aman ✓</div>:notif.map(b=>{
              const pct=Math.round((b.stok_saat_ini/b.stok_awal)*100);
              return <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 10px",background:"#2d1b1b",borderRadius:8,marginBottom:4}}>
                <span style={{fontSize:13,color:"#fca5a5",fontWeight:700}}>{b.nama}</span>
                <span style={{fontSize:12,color:"#ef4444",fontWeight:800}}>{pct}%</span>
              </div>;
            })}

        {showReset&&(

              <div style={{fontSize:18,fontWeight:900,color:"#ef4444",marginBottom:8}}>⚠️ Reset Semua Data?</div>
              <div style={{fontSize:13,color:"#9ca3af",marginBottom:20,lineHeight:1.7}}>Semua data bahan, komponen, produk, dan transaksi akan dihapus. Tidak bisa dibatalkan.</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowReset(false)} style={{flex:1,padding:"12px",background:"#2a2a3e",border:"none",borderRadius:12,color:"#e2e8f0",fontSize:14,fontWeight:700,cursor:"pointer"}}>Batal</button>
                <button onClick={resetAll} style={{flex:1,padding:"12px",background:"#7f1d1d",border:"none",borderRadius:12,color:"#fca5a5",fontSize:14,fontWeight:700,cursor:"pointer"}}>Reset</button>
              </div>
            </div>
          </div>
        )}

        <div style={{background:"#0a0a0f",padding:"3px 20px",display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#22c55e"}}/>
          <span style={{fontSize:9,color:"#374151",fontFamily:"'Space Mono'"}}>Bahan → Komponen → Produk | Data tersimpan lokal</span>
        </div>

        <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
          {tab==="dashboard"&&<DashboardPage bahan={bahan} komponen={komponen} produk={produk} transaksi={transaksi} biayaOps={biayaOps}/>}
          {tab==="bahan"&&<BahanPage bahan={bahan} setBahan={setBahan} biayaOps={biayaOps} setBiayaOps={setBiayaOps} perlengkapan={perlengkapan} setPerlengkapan={setPerlengkapan}/>}
          {tab==="komponen"&&<KomponenPage komponen={komponen} setKomponen={setKomponen} bahan={bahan}/>}
          {tab==="produk"&&<ProdukPage produk={produk} setProduk={setProduk} komponen={komponen} bahan={bahan} biayaOps={biayaOps} paket={paket} setPaket={setPaket}/>}
          {tab==="kasir"&&<KasirPage produk={produk} paket={paket} komponen={komponen} bahan={bahan} addTransaksi={addTransaksi} perlengkapan={perlengkapan} setPerlengkapan={setPerlengkapan}/>}
          {tab==="laporan"&&<LaporanPage transaksi={transaksi} produk={produk} paket={paket}/>}
        </div>

        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0f0f14",borderTop:"1px solid #1f1f2e",display:"flex",zIndex:100,padding:"6px 0 10px"}}>
          {tabs.map(t=>{const a=tab===t.id;return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"3px 0"}}>
              <div style={{width:38,height:34,borderRadius:10,background:a?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                <Icon name={t.icon} size={19} color={a?"#fff":"#4b5563"}/>
              </div>
              <span style={{fontSize:9,fontWeight:a?800:600,color:a?"#6366f1":"#4b5563"}}>{t.label}</span>
            </button>
          );})}
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage({bahan,komponen,produk,transaksi,biayaOps}) {
  const today=new Date().toDateString();
  const todayTx=transaksi.filter(t=>new Date(t.waktu).toDateString()===today);
  const totalHarian=todayTx.reduce((a,t)=>a+t.total,0);
  const menuCount={};
  transaksi.forEach(t=>t.items.forEach(i=>{menuCount[i.nama]=(menuCount[i.nama]||0)+i.qty;}));
  const terlaris=Object.entries(menuCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  const porsiData = produk.map(pr => {
    const {porsi} = hitungPorsiProduk(pr, komponen, bahan);
    const hpp = hppProduk(pr, komponen, bahan, biayaOps);
    return {...pr, porsi, hpp_total: hpp.hpp_total};
  }).sort((a,b)=>a.porsi-b.porsi);

  const totalPorsi=porsiData.reduce((a,p)=>a+p.porsi,0);
  const habis=porsiData.filter(p=>p.porsi===0).length;
  const kritis=porsiData.filter(p=>p.porsi>0&&p.porsi<=5).length;

  return (
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        <Card bg="linear-gradient(135deg,#6366f1,#8b5cf6)">
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Penjualan Hari Ini</div>
          <div style={{fontSize:21,fontWeight:900,color:"#fff",marginTop:4}}>{fmt(totalHarian)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{todayTx.length} transaksi</div>
        </Card>
        <Card bg={habis>0?"linear-gradient(135deg,#7f1d1d,#991b1b)":kritis>0?"linear-gradient(135deg,#78350f,#92400e)":"linear-gradient(135deg,#14532d,#166534)"}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Kapasitas Produksi</div>
          <div style={{fontSize:21,fontWeight:900,color:"#fff",marginTop:4}}>{totalPorsi} porsi</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{habis>0?`⛔ ${habis} habis`:kritis>0?`⚠ ${kritis} kritis`:`✓ ${produk.length} produk ok`}</div>
        </Card>
      </div>

      <ST>🍽️ Estimasi Porsi per Produk</ST>
      {porsiData.map(pr=>{
        const max=Math.max(...porsiData.map(x=>x.porsi),1);
        const bp=Math.min(100,Math.round((pr.porsi/max)*100));
        const w=pr.porsi===0?"#ef4444":pr.porsi<=5?"#f59e0b":"#22c55e";
        const wl=pr.porsi===0?"#fee2e2":pr.porsi<=5?"#fef3c7":"#dcfce7";
        const wt=pr.porsi===0?"#b91c1c":pr.porsi<=5?"#b45309":"#15803d";
        return (
          <div key={pr.id} style={{background:"#1a1a24",borderRadius:14,padding:"12px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>{pr.nama}</div>
                <div style={{fontSize:11,color:"#4b5563"}}>HPP {fmt(pr.hpp_total)} · Jual {fmt(pr.harga_jual)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Space Mono'",fontSize:18,fontWeight:900,color:w,lineHeight:1}}>{pr.porsi}</div>
                <div style={{fontSize:10,background:wl,color:wt,padding:"1px 6px",borderRadius:20,fontWeight:800}}>{pr.porsi===0?"Habis":pr.porsi<=5?"Kritis":"Tersedia"}</div>
              </div>
            </div>
            <div style={{background:"#0f0f18",borderRadius:6,height:6,overflow:"hidden"}}>
              <div style={{width:`${bp}%`,height:"100%",background:w,borderRadius:6}}/>
            </div>
          </div>
        );
      })}

      <ST mt={16}>📊 Status Bahan Baku</ST>
      {bahan.map(b=>{
        const pct=b.stok_awal>0?Math.round((b.stok_saat_ini/b.stok_awal)*100):0;
        const w=getWarna(pct);
        const qty=b.satuan==="pcs"?`${b.stok_saat_ini} pcs`:b.stok_saat_ini>=1000?`${(b.stok_saat_ini/1000).toFixed(2)} ${b.satuan==="gram"?"kg":"L"}`:`${b.stok_saat_ini} ${b.satuan}`;
        return (
          <div key={b.id} style={{background:"#1a1a24",borderRadius:12,padding:"10px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{b.nama}</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,background:w.light,color:w.text,padding:"1px 7px",borderRadius:20,fontWeight:800}}>{w.label}</span>
                <span style={{fontFamily:"'Space Mono'",fontSize:12,color:w.bg,fontWeight:700}}>{pct}%</span>
              </div>
            </div>
            <div style={{background:"#0f0f18",borderRadius:6,height:7,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:w.bg,borderRadius:6}}/>
            </div>
            <div style={{fontSize:10,color:"#4b5563",marginTop:4}}>{qty}</div>
          </div>
        );
      })}

      <ST mt={16}>🔥 Menu Terlaris</ST>
      {terlaris.length===0?<Empty t="Belum ada transaksi"/>:terlaris.map(([nama,qty],i)=>(
        <div key={nama} style={{background:"#1a1a24",borderRadius:12,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:26,height:26,background:["#f59e0b","#94a3b8","#cd7c2f"][i]||"#2a2a3e",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Space Mono'",fontSize:11,fontWeight:700,color:"#fff"}}>{i+1}</div>
          <div style={{flex:1,fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{nama}</div>
          <div style={{fontFamily:"'Space Mono'",fontSize:12,color:"#6366f1",fontWeight:700}}>{qty}x</div>
        </div>
      ))}
    </div>
  );
}

// ─── BAHAN BAKU PAGE ──────────────────────────────────────────────────────────
function BahanPage({bahan,setBahan,biayaOps,setBiayaOps,perlengkapan,setPerlengkapan}) {
  const [subTab,setSubTab]=useState("bahan");
  const [showForm,setShowForm]=useState(false);
  const [editB,setEditB]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editStok,setEditStok]=useState("");
  const [editMax,setEditMax]=useState("");
  // Tambah stok form
  const [selId,setSelId]=useState("");
  const [qty,setQty]=useState("");
  const [unit,setUnit]=useState("gram");
  const [harga,setHarga]=useState("");
  const [tgl,setTgl]=useState(new Date().toISOString().slice(0,10));
  // Perlengkapan
  const [plNama,setPlNama]=useState("");
  const [plQty,setPlQty]=useState("");

  const selBahan=bahan.find(b=>b.id===selId);
  const isPcs=selBahan?.satuan==="pcs";
  const unitOpts=isPcs?["pcs","lusin (12)","kodi (20)","gross (144)"]:selBahan?.satuan==="ml"?["ml","liter"]:["gram","kg"];
  const KONV={"gram":1,"kg":1000,"ml":1,"liter":1000,"pcs":1,"lusin (12)":12,"kodi (20)":20,"gross (144)":144};

  const saveBahan=(b)=>{
    if(b.id) setBahan(prev=>prev.map(x=>x.id===b.id?b:x));
    else setBahan(prev=>[...prev,{...b,id:"bb"+uid(),stok_saat_ini:0,stok_awal:0,riwayat:[]}]);
    setShowForm(false);setEditB(null);
  };
  const deleteBahan=(id)=>setBahan(prev=>prev.filter(b=>b.id!==id));

  const tambahStok=()=>{
    if(!selId||!qty||!harga) return alert("Lengkapi semua field!");
    const k=KONV[unit]||1;
    const qd=Number(qty)*k;
    const hpp=isPcs?Number(harga)/k:Number(harga)/(Number(qty)*k);
    setBahan(prev=>prev.map(b=>b.id!==selId?b:{
      ...b,
      stok_awal:b.stok_awal+qd,
      stok_saat_ini:b.stok_saat_ini+qd,
      harga_per_satuan:hpp,
      riwayat:[...(b.riwayat||[]),{tanggal:tgl,qty:qd,harga:Number(harga),unit}]
    }));
    setQty("");setHarga("");setSelId("");
  };

  const startEdit=(id)=>{
    const b=bahan.find(x=>x.id===id);
    const v=b.satuan==="pcs"?String(b.stok_saat_ini):b.stok_saat_ini>=1000?String((b.stok_saat_ini/1000).toFixed(3)):String(b.stok_saat_ini);
    const m=b.satuan==="pcs"?String(b.stok_awal):b.stok_awal>=1000?String((b.stok_awal/1000).toFixed(3)):String(b.stok_awal);
    setEditStok(v);setEditMax(m);setEditId(id);
  };
  const saveEdit=(id)=>{
    const b=bahan.find(x=>x.id===id);
    const vt=parseFloat(editStok),vm=parseFloat(editMax);
    if(isNaN(vt)||vt<0||isNaN(vm)||vm<=0) return alert("Nilai tidak valid!");
    if(vt>vm) return alert("Tersedia > Maksimal!");
    const toBase=(v)=>b.satuan==="pcs"?v:b.stok_awal>=1000||b.stok_saat_ini>=1000?v*1000:v;
    setBahan(prev=>prev.map(x=>x.id!==id?x:{...x,stok_saat_ini:toBase(vt),stok_awal:toBase(vm)}));
    setEditId(null);
  };

  if(showForm) return <BahanForm bahan={editB} onSave={saveBahan} onBack={()=>{setShowForm(false);setEditB(null);}}/>;

  return (
    <div style={{padding:"0 0 16px"}}>
      <div style={{display:"flex",borderBottom:"1px solid #2a2a3e"}}>
        {[["bahan","Bahan Baku"],["stok","Update Stok"],["perlengkapan","Perlengkapan"],["ops","Biaya Ops"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setSubTab(id)} style={{flex:1,padding:"11px 0",background:"none",border:"none",borderBottom:subTab===id?"2px solid #6366f1":"2px solid transparent",color:subTab===id?"#6366f1":"#6b7280",fontSize:11,fontWeight:700,cursor:"pointer"}}>{lbl}</button>
        ))}
      </div>

      {subTab==="bahan"&&(
        <div style={{padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:13,color:"#6b7280"}}>{bahan.length} bahan terdaftar</span>
            <button onClick={()=>{setEditB(null);setShowForm(true);}} style={BS("#6366f1")}><Icon name="plus" size={15} color="#fff"/> Tambah</button>
          </div>
          {bahan.map(b=>{
            const pct=b.stok_awal>0?Math.round((b.stok_saat_ini/b.stok_awal)*100):0;
            const w=getWarna(pct);
            const isE=editId===b.id;
            const du=b.satuan==="pcs"?"pcs":(b.stok_awal>=1000||b.stok_saat_ini>=1000)?(b.satuan==="gram"?"kg":"L"):b.satuan;
            return (
              <div key={b.id} style={{background:isE?"#1a1a2e":"#1a1a24",borderRadius:14,padding:"13px 15px",marginBottom:10,border:isE?"1.5px solid #6366f1":"1.5px solid transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>{b.nama}</div>
                    <div style={{fontSize:11,color:"#6b7280"}}>{b.satuan==="pcs"?`${fmt(b.harga_per_satuan)}/pcs`:`${fmt(b.harga_per_satuan*1000)}/kg`}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Space Mono'",fontSize:13,color:w.bg,fontWeight:700}}>{pct}%</div>
                    <div style={{fontSize:10,background:w.light,color:w.text,padding:"1px 6px",borderRadius:10,fontWeight:800}}>{w.label}</div>
                  </div>
                </div>
                <div style={{background:"#0f0f18",borderRadius:6,height:7,overflow:"hidden",marginBottom:7}}>
                  <div style={{width:`${pct}%`,height:"100%",background:w.bg,borderRadius:6}}/>
                </div>
                {isE?(
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div>
                        <div style={{fontSize:10,color:"#6b7280",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Tersedia</div>
                        <div style={{display:"flex",alignItems:"center",background:"#0f0f18",borderRadius:8,border:"1.5px solid #6366f1",overflow:"hidden"}}>
                          <input type="number" value={editStok} onChange={e=>setEditStok(e.target.value)} autoFocus style={{flex:1,background:"transparent",border:"none",padding:"8px 10px",color:"#e2e8f0",fontSize:14,fontWeight:700,outline:"none",fontFamily:"'Space Mono'"}}/>
                          <span style={{padding:"0 8px",color:"#6366f1",fontSize:12,fontWeight:700}}>{du}</span>
                        </div>
                      </div>
                      <div>
                        <div style={{fontSize:10,color:"#6b7280",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Maksimal</div>
                        <div style={{display:"flex",alignItems:"center",background:"#0f0f18",borderRadius:8,border:"1.5px solid #374151",overflow:"hidden"}}>
                          <input type="number" value={editMax} onChange={e=>setEditMax(e.target.value)} style={{flex:1,background:"transparent",border:"none",padding:"8px 10px",color:"#e2e8f0",fontSize:14,fontWeight:700,outline:"none",fontFamily:"'Space Mono'"}}/>
                          <span style={{padding:"0 8px",color:"#9ca3af",fontSize:12,fontWeight:700}}>{du}</span>
                        </div>
                      </div>
                    </div>
                    {editStok&&editMax&&parseFloat(editMax)>0&&parseFloat(editStok)<=parseFloat(editMax)&&(
                      <div style={{background:"#0f0f18",borderRadius:7,padding:"5px 10px",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:11,color:"#6b7280"}}>Preview:</span>
                        <span style={{fontSize:12,fontWeight:800,color:"#22c55e",fontFamily:"'Space Mono'"}}>{Math.round((parseFloat(editStok)/parseFloat(editMax))*100)}%</span>
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>saveEdit(b.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,background:"#22c55e",border:"none",borderRadius:9,padding:"9px",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff"}}><Icon name="check" size={15} color="#fff"/> Simpan</button>
                      <button onClick={()=>setEditId(null)} style={{background:"#2a2a3e",border:"none",borderRadius:9,padding:"9px 13px",cursor:"pointer",display:"flex",alignItems:"center"}}><Icon name="close" size={15} color="#9ca3af"/></button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,color:"#9ca3af",fontFamily:"'Space Mono'"}}>
                      {b.satuan==="pcs"?`${b.stok_saat_ini} pcs`:b.stok_saat_ini>=1000?`${(b.stok_saat_ini/1000).toFixed(2)} ${b.satuan==="gram"?"kg":"L"}`:`${b.stok_saat_ini} ${b.satuan}`}
                    </span>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>startEdit(b.id)} style={{display:"flex",alignItems:"center",gap:4,background:"#1f1f2e",border:"1px solid #2a2a3e",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700,color:"#9ca3af"}}><Icon name="edit" size={12} color="#6366f1"/> Edit</button>
                      <button onClick={()=>{setEditB(b);setShowForm(true);}} style={{display:"flex",alignItems:"center",gap:4,background:"#1f1f2e",border:"1px solid #2a2a3e",borderRadius:7,padding:"4px 9px",cursor:"pointer",fontSize:11,fontWeight:700,color:"#9ca3af"}}><Icon name="settings" size={12} color="#9ca3af"/> Info</button>
                      <button onClick={()=>deleteBahan(b.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="trash" size={15} color="#4b5563"/></button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

            <FG label="Jumlah Stok (pcs)"><input type="number" value={plQty} onChange={e=>setPlQty(e.target.value)} placeholder="100" style={IS}/></FG>
            <button onClick={()=>{if(!plNama||!plQty)return alert("Isi semua field!");setPerlengkapan(prev=>({...prev,["pl"+uid()]:{nama:plNama,stok_awal:Number(plQty),stok_saat_ini:Number(plQty),satuan:"pcs"}}));setPlNama("");setPlQty("");}} style={{...BS("#6366f1"),width:"100%",justifyContent:"center",padding:"11px"}}><Icon name="plus" size={15} color="#fff"/> Tambah</button>
          </div>
          {Object.entries(perlengkapan).map(([id,p])=>{
            const pct=p.stok_awal>0?Math.round((p.stok_saat_ini/p.stok_awal)*100):0;
            const w=getWarna(pct);
            return (
              <div key={id} style={{background:"#1a1a24",borderRadius:14,padding:"13px 15px",marginBottom:10}}>

                  <span style={{fontSize:12,color:"#9ca3af",fontFamily:"'Space Mono'"}}>{p.stok_saat_ini} / {p.stok_awal} pcs</span>

            <div style={{fontSize:13,fontWeight:800,color:"#6366f1",marginBottom:4}}>⚙️ Biaya Operasional Global</div>
            <div style={{fontSize:11,color:"#4b5563",marginBottom:14,lineHeight:1.6}}>Dipakai dalam perhitungan HPP semua produk. Ubah di sini berlaku global.</div>
            {Object.entries(biayaOps).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <label style={{fontSize:14,color:"#e2e8f0",fontWeight:700,textTransform:"capitalize"}}>{k==="labor"?"Labor Cost":k.charAt(0).toUpperCase()+k.slice(1)}</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="number" value={v} onChange={e=>setBiayaOps(p=>({...p,[k]:Number(e.target.value)}))} style={{...IS,width:90,textAlign:"right",marginBottom:0}}/>
                  <span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>Rp/porsi</span>
                </div>
              </div>
            ))}
            <div style={{height:1,background:"#2a2a3e",margin:"10px 0"}}/>
            <R label="Total per porsi" value={fmt(Object.values(biayaOps).reduce((a,b)=>a+Number(b),0))} bold/>
          </div>
        </div>
      )}
    </div>
  );
}

function BahanForm({bahan,onSave,onBack}) {

  const [satuan,setSatuan]=useState(bahan?.satuan||"gram");

    <div style={{padding:"16px 20px"}}>

        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Icon name="back" size={22} color="#9ca3af"/></button>

      <FG label={`Harga per satuan (Rp/${satuan==="gram"?"gram — isi 0, update saat restock":"pcs"})`}>
        <input type="number" value={harga} onChange={e=>setHarga(e.target.value)} placeholder="0" style={IS}/>

}

function KomponenPage({komponen,setKomponen,bahan}) {
  const [view,setView]=useState("list");
  const [editKo,setEditKo]=useState(null);

  const saveKo=(ko)=>{
    if(ko.id&&komponen.find(k=>k.id===ko.id)) setKomponen(prev=>prev.map(k=>k.id===ko.id?ko:k));
    else setKomponen(prev=>[...prev,{...ko,id:"ko"+uid()}]);
    setView("list");setEditKo(null);
  };
  const deleteKo=(id)=>setKomponen(prev=>prev.filter(k=>k.id!==id));

  if(view==="form") return <KomponenForm ko={editKo} bahan={bahan} komponen={komponen} onSave={saveKo} onBack={()=>{setView("list");setEditKo(null);}}/>;

  return (
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:13,color:"#6b7280"}}>{komponen.length} komponen / resep</span>
        <button onClick={()=>{setEditKo(null);setView("form");}} style={BS("#6366f1")}><Icon name="plus" size={15} color="#fff"/> Tambah</button>
      </div>
      <div style={{background:"#1a1a24",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
        <div style={{fontSize:12,color:"#6b7280",lineHeight:1.7}}>🧩 Komponen adalah resep setengah jadi yang bisa dipakai di banyak produk. Contoh: <strong style={{color:"#9ca3af"}}>Sambal Geprek</strong>, <strong style={{color:"#9ca3af"}}>Ayam Goreng</strong>, <strong style={{color:"#9ca3af"}}>Nasi Putih</strong>.</div>
      </div>
      {komponen.map(ko=>{
        const hpp=hppKomponen(ko.id,komponen,bahan);
        const yp=ko.yield_mode==="batch"?(ko.yield_porsi||1):1;
        return (
          <div key={ko.id} style={{background:"#1a1a24",borderRadius:14,padding:"13px 15px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>{ko.nama}</div>
                <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>
                  {ko.yield_mode==="batch"?`Batch ${ko.batch_qty}x → ${ko.yield_porsi} porsi`:"Per porsi"}
                  {" · "}{ko.detail.length} bahan/komponen
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#22c55e",fontFamily:"'Space Mono'"}}>{fmt(hpp)}</div>
                <div style={{fontSize:10,color:"#6b7280"}}>/porsi</div>
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
              {ko.detail.map((d,i)=>{
                const label=d.tipe==="bahan"?bahan.find(b=>b.id===d.item_id)?.nama:komponen.find(k=>k.id===d.item_id)?.nama;
                return <span key={i} style={{fontSize:10,background:d.tipe==="komponen"?"#1e1b4b":"#0f0f18",color:d.tipe==="komponen"?"#a5b4fc":"#9ca3af",padding:"2px 8px",borderRadius:20,border:"1px solid #2a2a3e"}}>{label||"?"} {d.qty}{d.satuan}</span>;
              })}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditKo(ko);setView("form");}} style={{...BS("#2563eb"),fontSize:11,padding:"5px 11px"}}>Edit</button>
              <button onClick={()=>deleteKo(ko.id)} style={{...BS("#7f1d1d"),fontSize:11,padding:"5px 11px"}}>Hapus</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function KomponenForm({ko,bahan,komponen,onSave,onBack}) {
  const [nama,setNama]=useState(ko?.nama||"");
  const [yieldMode,setYieldMode]=useState(ko?.yield_mode||"batch");
  const [batchQty,setBatchQty]=useState(ko?.batch_qty||1);
  const [yieldPorsi,setYieldPorsi]=useState(ko?.yield_porsi||1);
  const [detail,setDetail]=useState(ko?.detail||[{item_id:"",tipe:"bahan",qty:"",satuan:"gram"}]);

  const addDetail=()=>setDetail(prev=>[...prev,{item_id:"",tipe:"bahan",qty:"",satuan:"gram"}]);
  const removeDetail=(i)=>setDetail(prev=>prev.filter((_,idx)=>idx!==i));
  const updateDetail=(i,field,val)=>setDetail(prev=>prev.map((d,idx)=>{
    if(idx!==i) return d;
    const nd={...d,[field]:val};
    if(field==="item_id"&&d.tipe==="bahan"){const b=bahan.find(x=>x.id===val);if(b) nd.satuan=b.satuan;}
    if(field==="tipe"){ nd.item_id=""; nd.satuan="gram"; }
    return nd;
  }));

  const handleSave=()=>{
    if(!nama||detail.some(d=>!d.item_id||!d.qty)) return alert("Lengkapi semua field!");
    onSave({...ko,nama,yield_mode:yieldMode,batch_qty:Number(batchQty),yield_porsi:Number(yieldPorsi),detail:detail.map(d=>({...d,qty:Number(d.qty)}))});
  };

  const availKomponen=komponen.filter(k=>k.id!==ko?.id);
  const hppPreview=()=>{
    let total=0;
    detail.forEach(d=>{
      if(!d.item_id||!d.qty) return;
      if(d.tipe==="bahan"){const b=bahan.find(x=>x.id===d.item_id);if(b) total+=Number(d.qty)*b.harga_per_satuan;}
      else{const subHpp=hppKomponen(d.item_id,komponen,bahan);total+=subHpp*Number(d.qty);}
    });
    const yp=yieldMode==="batch"?(Number(yieldPorsi)||1):1;
    return Math.round(total/yp);
  };

  return (
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Icon name="back" size={22} color="#9ca3af"/></button>
        <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>{ko?"Edit Komponen":"Tambah Komponen"}</div>
      </div>
      <FG label="Nama Komponen"><input value={nama} onChange={e=>setNama(e.target.value)} placeholder="Ayam Goreng Tepung, Sambal..." style={IS}/></FG>

      <div style={{background:"#1a1a24",borderRadius:12,padding:"14px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,color:"#6b7280",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Yield / Hasil Jadi</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["batch","Input Total Batch"],["per_porsi","Input Per Porsi"]].map(([v,l])=>(
            <button key={v} onClick={()=>setYieldMode(v)} style={{flex:1,padding:"8px",borderRadius:9,border:"1.5px solid",borderColor:yieldMode===v?"#6366f1":"#2a2a3e",background:yieldMode===v?"#1e1b4b":"#0f0f18",color:yieldMode===v?"#a5b4fc":"#6b7280",fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {yieldMode==="batch"?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Qty 1 batch (porsi bahan)">
              <input type="number" value={batchQty} onChange={e=>setBatchQty(e.target.value)} style={{...IS,marginBottom:0}}/>
            </FG>
            <FG label="Hasil jadi (porsi)">
              <input type="number" value={yieldPorsi} onChange={e=>setYieldPorsi(e.target.value)} style={{...IS,marginBottom:0}}/>
            </FG>
          </div>
        ):<div style={{fontSize:12,color:"#6b7280",padding:"6px 0"}}>Bahan diinput langsung untuk 1 porsi.</div>}
      </div>

      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <label style={LS}>Daftar Bahan / Sub-komponen</label>
          <button onClick={addDetail} style={{...BS("#4b5563"),fontSize:11,padding:"4px 10px"}}><Icon name="plus" size={13} color="#fff"/> Tambah</button>
        </div>
        {detail.map((d,i)=>(
          <div key={i} style={{background:"#1a1a24",borderRadius:11,padding:"11px",marginBottom:8,border:`1.5px solid ${d.tipe==="komponen"?"#1e1b4b":"#1f1f2e"}`}}>
            <div style={{display:"flex",gap:6,marginBottom:7}}>
              {[["bahan","🌾 Bahan"],["komponen","🧩 Komponen"]].map(([v,l])=>(
                <button key={v} onClick={()=>updateDetail(i,"tipe",v)} style={{flex:1,padding:"5px",borderRadius:7,border:"1.5px solid",borderColor:d.tipe===v?"#6366f1":"#2a2a3e",background:d.tipe===v?"#1e1b4b":"#0f0f18",color:d.tipe===v?"#a5b4fc":"#6b7280",fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
              ))}
              <button onClick={()=>removeDetail(i)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="close" size={16} color="#6b7280"/></button>
            </div>
            <select value={d.item_id} onChange={e=>updateDetail(i,"item_id",e.target.value)} style={{...IS,marginBottom:7}}>
              <option value="">-- Pilih {d.tipe} --</option>
              {d.tipe==="bahan"?bahan.map(b=><option key={b.id} value={b.id}>{b.nama} ({b.satuan})</option>):availKomponen.map(k=><option key={k.id} value={k.id}>{k.nama}</option>)}
            </select>
            <div style={{display:"flex",gap:6}}>
              <input type="number" value={d.qty} onChange={e=>updateDetail(i,"qty",e.target.value)} placeholder="Qty" style={{...IS,flex:1,marginBottom:0}}/>
              {d.tipe==="bahan"&&<select value={d.satuan} onChange={e=>updateDetail(i,"satuan",e.target.value)} style={{...IS,flex:1,marginBottom:0}}>{["gram","ml","kg","liter","pcs"].map(s=><option key={s}>{s}</option>)}</select>}
              {d.tipe==="komponen"&&<div style={{flex:1,background:"#0f0f18",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#6b7280"}}>porsi</div>}
            </div>
          </div>
        ))}
      </div>

      {detail.some(d=>d.item_id&&d.qty)&&(
        <div style={{background:"#0f2a1e",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#6ee7b7"}}>HPP per porsi (estimasi):</span>
          <span style={{fontSize:14,fontWeight:800,color:"#22c55e",fontFamily:"'Space Mono'"}}>{fmt(hppPreview())}</span>
        </div>
      )}

      <button onClick={handleSave} style={{...BS("#6366f1"),width:"100%",justifyContent:"center",padding:"13px"}}><Icon name="check" size={16} color="#fff"/> Simpan Komponen</button>
    </div>
  );
}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

          </div>

function HppDetailView({pr,komponen,bahan,biayaOps,onBack}) {
  const hpp=hppProduk(pr,komponen,bahan,biayaOps);
  const margins=[10,20,30,50];
  return (
    <div style={{padding:"16px 20px"}}>

        <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>HPP Detail · {pr.nama}</div>
      </div>
      <ST>🧩 Breakdown per Komponen</ST>
      {pr.komposisi.map((k,i)=>{
        const ko=komponen.find(x=>x.id===k.item_id);
        const subHpp=ko?hppKomponen(k.item_id,komponen,bahan):0;
        return (
          <div key={i} style={{background:"#1a1a24",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0"}}>{ko?.nama||"?"} ×{k.qty}</div>
                <div style={{fontSize:11,color:"#6b7280"}}>{ko?.yield_mode==="batch"?`Batch ${ko.batch_qty}x → ${ko.yield_porsi} porsi`:"per porsi"}</div>
              </div>
              <div style={{fontSize:14,fontWeight:800,color:"#a5b4fc",fontFamily:"'Space Mono'"}}>{fmt(subHpp*k.qty)}</div>
            </div>
            {ko?.detail.map((d,j)=>{
              const b=bahan.find(x=>x.id===d.item_id);
              const subKo=komponen.find(x=>x.id===d.item_id);
              const yp=ko.yield_mode==="batch"?(ko.yield_porsi||1):1;
              const biaya=b?(d.qty/yp)*b.harga_per_satuan*k.qty:subKo?(hppKomponen(d.item_id,komponen,bahan)/yp)*d.qty*k.qty:0;
              return (
                <div key={j} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1f1f2e"}}>
                  <span style={{fontSize:11,color:"#6b7280",paddingLeft:8}}>↳ {b?.nama||subKo?.nama||"?"} {d.qty}{d.satuan}</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{fmt(Math.round(biaya))}</span>
                </div>
              );
            })}
          </div>
        );
      })}
      <div style={{background:"#1a1a24",borderRadius:12,padding:"14px",margin:"14px 0"}}>
        <R label="Total Bahan (via komponen)" value={fmt(hpp.hpp_komponen)}/>
        <R label="Biaya Operasional" value={fmt(hpp.ops)} sm/>
        <div style={{height:1,background:"#2a2a3e",margin:"8px 0"}}/>
        <R label="HPP Total" value={fmt(hpp.hpp_total)} bold/>
        <R label="Harga Jual" value={fmt(pr.harga_jual)} bold/>
        <div style={{height:1,background:"#2a2a3e",margin:"8px 0"}}/>
        <R label={`Margin ${Math.round((1-hpp.hpp_total/pr.harga_jual)*100)}%`} value={fmt(pr.harga_jual-hpp.hpp_total)} bold/>
      </div>
      <ST>📈 Simulasi Margin</ST>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {margins.map(m=>(
          <div key={m} style={{background:"#1a1a24",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:19,fontWeight:900,color:m===30?"#6366f1":"#e2e8f0"}}>{m}%</div>
            <div style={{fontSize:10,color:"#6b7280",marginBottom:3}}>Margin</div>
            <div style={{fontSize:13,fontWeight:800,color:"#22c55e"}}>{fmt(Math.round(hpp.hpp_total/(1-m/100)))}</div>
          </div>
        ))}
      </div>
    </div>
  );

function ProdukForm({pr,komponen,bahan,biayaOps,onSave,onBack}) {
  const [nama,setNama]=useState(pr?.nama||"");
  const [kat,setKat]=useState(pr?.kategori||"Makanan");
  const [harga,setHarga]=useState(pr?.harga_jual||"");
  const [komposisi,setKomposisi]=useState(pr?.komposisi||[{item_id:"",tipe:"komponen",qty:1}]);

  const addK=()=>setKomposisi(prev=>[...prev,{item_id:"",tipe:"komponen",qty:1}]);
  const removeK=(i)=>setKomposisi(prev=>prev.filter((_,idx)=>idx!==i));
  const updateK=(i,f,v)=>setKomposisi(prev=>prev.map((k,idx)=>{if(idx!==i)return k;const nk={...k,[f]:v};if(f==="tipe")nk.item_id="";return nk;}));

  const hppPrev=()=>{
    let t=0;
    komposisi.forEach(k=>{
      if(!k.item_id||!k.qty) return;
      if(k.tipe==="komponen") t+=hppKomponen(k.item_id,komponen,bahan)*Number(k.qty);
      else{const b=bahan.find(x=>x.id===k.item_id);if(b) t+=k.qty*b.harga_per_satuan;}
    });
    return Math.round(t+Object.values(biayaOps).reduce((a,b)=>a+b,0));
  };

  const handleSave=()=>{
    if(!nama||!harga||komposisi.some(k=>!k.item_id||!k.qty)) return alert("Lengkapi semua field!");
    onSave({...pr,nama,kategori:kat,harga_jual:Number(harga),komposisi:komposisi.map(k=>({...k,qty:Number(k.qty)}))});
  };

  return (
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Icon name="back" size={22} color="#9ca3af"/></button>
        <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>{pr?"Edit Produk":"Tambah Produk"}</div>
      </div>
      <FG label="Nama Produk"><input value={nama} onChange={e=>setNama(e.target.value)} placeholder="Mie Ayam, Bakso..." style={IS}/></FG>
      <FG label="Kategori">
        <select value={kat} onChange={e=>setKat(e.target.value)} style={IS}>
          {["Makanan","Minuman","Snack","Paket"].map(k=><option key={k}>{k}</option>)}
        </select>
      </FG>
      <FG label="Harga Jual (Rp)"><input type="number" value={harga} onChange={e=>setHarga(e.target.value)} placeholder="18000" style={IS}/></FG>

      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <label style={LS}>Komposisi Produk</label>
          <button onClick={addK} style={{...BS("#4b5563"),fontSize:11,padding:"4px 10px"}}><Icon name="plus" size={13} color="#fff"/> Tambah</button>
        </div>
        {komposisi.map((k,i)=>(
          <div key={i} style={{background:"#1a1a24",borderRadius:11,padding:"11px",marginBottom:8}}>
            <div style={{display:"flex",gap:6,marginBottom:7,alignItems:"center"}}>
              <select value={k.tipe} onChange={e=>updateK(i,"tipe",e.target.value)} style={{...IS,flex:1,marginBottom:0,fontSize:12}}>
                <option value="komponen">🧩 Komponen</option>
                <option value="bahan">🌾 Bahan Langsung</option>
              </select>
              <button onClick={()=>removeK(i)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon name="close" size={16} color="#6b7280"/></button>
            </div>
            <div style={{display:"flex",gap:6}}>
              <select value={k.item_id} onChange={e=>updateK(i,"item_id",e.target.value)} style={{...IS,flex:2,marginBottom:0}}>
                <option value="">-- Pilih --</option>
                {k.tipe==="komponen"?komponen.map(x=><option key={x.id} value={x.id}>{x.nama}</option>):bahan.map(x=><option key={x.id} value={x.id}>{x.nama} ({x.satuan})</option>)}
              </select>
              <input type="number" value={k.qty} onChange={e=>updateK(i,"qty",e.target.value)} placeholder="Qty" min={1} style={{...IS,width:65,marginBottom:0,textAlign:"center"}}/>
            </div>
          </div>
        ))}
      </div>

      {komposisi.some(k=>k.item_id&&k.qty)&&(
        <div style={{background:"#0f2a1e",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#6ee7b7"}}>HPP estimasi (incl. biaya ops):</span>
          <span style={{fontSize:14,fontWeight:800,color:"#22c55e",fontFamily:"'Space Mono'"}}>{fmt(hppPrev())}</span>
        </div>
      )}
      <button onClick={handleSave} style={{...BS("#6366f1"),width:"100%",justifyContent:"center",padding:"13px"}}><Icon name="check" size={16} color="#fff"/> Simpan Produk</button>
    </div>
  );
}

// ─── KASIR ────────────────────────────────────────────────────────────────────
function KasirPage({produk,paket,komponen,bahan,addTransaksi,perlengkapan,setPerlengkapan}) {
  const [cart,setCart]=useState([]);
  const [bayar,setBayar]=useState("");
  const [tipe,setTipe]=useState("dine-in");
  const [selPlk,setSelPlk]=useState([]);
  const [kasirTab,setKasirTab]=useState("produk");
  const [lastTx,setLastTx]=useState(null);
  const [showStruk,setShowStruk]=useState(false);

  const total=cart.reduce((a,i)=>a+i.harga*i.qty,0);
  const kembalian=Number(bayar)-total;

  const addCart=(id,nama,harga,jenis)=>{
    setCart(prev=>{
      const f=prev.find(x=>x.id===id);
      if(f) return prev.map(x=>x.id===id?{...x,qty:x.qty+1}:x);
      return [...prev,{id,nama,harga,qty:1,jenis}];
    });
  };
  const chQty=(id,d)=>setCart(prev=>prev.map(x=>x.id===id?{...x,qty:Math.max(0,x.qty+d)}:x).filter(x=>x.qty>0));
  const togglePlk=(id)=>setSelPlk(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  const handleBayar=()=>{
    if(cart.length===0) return alert("Keranjang kosong!");
    if(Number(bayar)<total) return alert("Bayar kurang!");
    // Siapkan items untuk kurang stok
    const itemsList=cart.map(item=>{
      const produkObj=item.jenis==="produk"?produk.find(p=>p.id===item.id):null;
      return {produk_id:item.id,qty:item.qty,produk_obj:produkObj};
    });
    // Kurangi perlengkapan
    if(tipe==="takeaway"&&selPlk.length>0){
      setPerlengkapan(prev=>{
        const n={...prev};
        selPlk.forEach(pid=>{if(n[pid]) n[pid]={...n[pid],stok_saat_ini:Math.max(0,n[pid].stok_saat_ini-cart.reduce((a,c)=>a+c.qty,0))};});
        return n;
      });
    }
    const tx={id:"tx"+uid(),waktu:new Date().toISOString(),items:cart,total,bayar:Number(bayar),kembalian,tipe};
    addTransaksi(tx,itemsList);
    setLastTx(tx);setShowStruk(true);
    setCart([]);setBayar("");setSelPlk([]);
  };

  if(showStruk&&lastTx) return <StrukPage tx={lastTx} onClose={()=>setShowStruk(false)}/>;

  const kategoris=[...new Set(produk.map(p=>p.kategori))];

  return (
    <div>
      <div style={{display:"flex",gap:8,padding:"12px 20px 8px"}}>
        {[["dine-in","Dine In"],["takeaway","Take Away"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTipe(v)} style={{flex:1,padding:"7px",borderRadius:9,border:"1.5px solid",borderColor:tipe===v?"#6366f1":"#2a2a3e",background:tipe===v?"#1e1b4b":"#1a1a24",color:tipe===v?"#a5b4fc":"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #2a2a3e"}}>
        {[["produk","Produk"],["paket","Paket"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setKasirTab(id)} style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:kasirTab===id?"2px solid #6366f1":"2px solid transparent",color:kasirTab===id?"#6366f1":"#6b7280",fontSize:12,fontWeight:700,cursor:"pointer"}}>{lbl}</button>
        ))}
      </div>
      <div style={{padding:"12px 20px 8px"}}>
        {kasirTab==="produk"&&kategoris.map(kat=>(
          <div key={kat} style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:800,color:"#6366f1",letterSpacing:2,textTransform:"uppercase",marginBottom:7}}>{kat}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {produk.filter(p=>p.kategori===kat).map(pr=>{
                const inCart=cart.find(x=>x.id===pr.id);
                const {porsi}=hitungPorsiProduk(pr,komponen,bahan);
                return (
                  <button key={pr.id} onClick={()=>porsi>0&&addCart(pr.id,pr.nama,pr.harga_jual,"produk")} style={{background:inCart?"#1e1b4b":"#1a1a24",border:inCart?"1.5px solid #6366f1":"1.5px solid transparent",borderRadius:13,padding:"13px 11px",textAlign:"left",cursor:porsi>0?"pointer":"not-allowed",position:"relative",opacity:porsi===0?0.5:1}}>
                    {inCart&&<div style={{position:"absolute",top:7,right:7,background:"#6366f1",color:"#fff",fontSize:10,fontWeight:800,borderRadius:20,padding:"1px 6px"}}>{inCart.qty}×</div>}
                    {porsi===0&&<div style={{position:"absolute",top:7,left:7,background:"#7f1d1d",color:"#fca5a5",fontSize:9,fontWeight:800,borderRadius:20,padding:"1px 5px"}}>HABIS</div>}
                    <div style={{fontSize:12,fontWeight:800,color:"#e2e8f0",marginBottom:3,lineHeight:1.2}}>{pr.nama}</div>
                    <div style={{fontSize:13,fontWeight:900,color:"#22c55e"}}>{fmt(pr.harga_jual)}</div>
                    <div style={{fontSize:10,color:"#4b5563",marginTop:2}}>{porsi} porsi</div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        {kasirTab==="paket"&&(paket.length===0?<Empty t="Belum ada paket"/>:
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {paket.map(p=>{
              const inCart=cart.find(x=>x.id===p.id);
              return (
                <button key={p.id} onClick={()=>addCart(p.id,p.nama,p.harga_jual,"paket")} style={{background:inCart?"#1e1b4b":"#1a1a24",border:inCart?"1.5px solid #6366f1":"1.5px solid transparent",borderRadius:13,padding:"13px 11px",textAlign:"left",cursor:"pointer",position:"relative"}}>
                  {inCart&&<div style={{position:"absolute",top:7,right:7,background:"#6366f1",color:"#fff",fontSize:10,fontWeight:800,borderRadius:20,padding:"1px 6px"}}>{inCart.qty}×</div>}
                  <div style={{fontSize:10,background:"#6366f1",color:"#fff",padding:"1px 5px",borderRadius:6,fontWeight:700,marginBottom:3,display:"inline-block"}}>PAKET</div>
                  <div style={{fontSize:12,fontWeight:800,color:"#e2e8f0",marginBottom:3,lineHeight:1.2}}>{p.nama}</div>
                  <div style={{fontSize:13,fontWeight:900,color:"#22c55e"}}>{fmt(p.harga_jual)}</div>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {tipe==="takeaway"&&Object.keys(perlengkapan).length>0&&(
        <div style={{padding:"8px 20px",background:"#111118",borderTop:"1px solid #1f1f2e"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#f59e0b",marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>🥡 Perlengkapan Take Away</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {Object.entries(perlengkapan).map(([id,p])=>{
              const s=selPlk.includes(id);
              return <button key={id} onClick={()=>togglePlk(id)} style={{padding:"4px 11px",borderRadius:20,border:"1.5px solid",borderColor:s?"#f59e0b":"#2a2a3e",background:s?"#1a1400":"#1a1a24",color:s?"#fbbf24":"#6b7280",fontSize:11,fontWeight:700,cursor:"pointer"}}>{s?"✓ ":""}{p.nama} ({p.stok_saat_ini})</button>;
            })}
          </div>
        </div>
      )}

      {cart.length>0&&(
        <div style={{background:"#1a1a24",borderTop:"1px solid #2a2a3e",padding:"14px 20px"}}>
          <div style={{fontSize:11,fontWeight:800,color:"#6b7280",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>🛒 Pesanan</div>
          {cart.map(item=>(
            <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{item.nama}</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>{fmt(item.harga)} × {item.qty}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{fontSize:12,fontWeight:800,color:"#22c55e",marginRight:6}}>{fmt(item.harga*item.qty)}</div>
                <button onClick={()=>chQty(item.id,-1)} style={{width:25,height:25,borderRadius:7,background:"#2a2a3e",border:"none",cursor:"pointer",color:"#e2e8f0",fontSize:15,fontWeight:700}}>−</button>
                <span style={{fontSize:13,fontWeight:800,color:"#e2e8f0",minWidth:18,textAlign:"center"}}>{item.qty}</span>
                <button onClick={()=>chQty(item.id,1)} style={{width:25,height:25,borderRadius:7,background:"#6366f1",border:"none",cursor:"pointer",color:"#fff",fontSize:15,fontWeight:700}}>+</button>
              </div>
            </div>
          ))}
          <div style={{height:1,background:"#2a2a3e",margin:"10px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>Total</span>
            <span style={{fontSize:17,fontWeight:900,color:"#22c55e",fontFamily:"'Space Mono'"}}>{fmt(total)}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <FG label="Bayar (Rp)"><input type="number" value={bayar} onChange={e=>setBayar(e.target.value)} placeholder={total.toString()} style={{...IS,marginBottom:0}}/></FG>
            <FG label="Kembalian"><div style={{background:"#0f0f18",borderRadius:10,padding:"10px 13px",fontSize:13,fontWeight:800,color:kembalian>=0&&bayar?"#22c55e":"#ef4444",border:"1.5px solid #1f1f2e"}}>{bayar?fmt(Math.max(0,kembalian)):"–"}</div></FG>
          </div>
          <button onClick={handleBayar} style={{...BS("#22c55e"),width:"100%",justifyContent:"center",padding:"13px",fontSize:14}}><Icon name="check" size={18} color="#fff"/> Proses Pembayaran</button>
        </div>
      )}
    </div>
  );
}

// ─── STRUK ────────────────────────────────────────────────────────────────────
function StrukPage({tx,onClose}) {
  const printBT=async()=>{
    if(!navigator.bluetooth){alert("Gunakan Chrome di Android/desktop untuk Bluetooth print.");return;}
    try{
      const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:["000018f0-0000-1000-8000-00805f9b34fb"]});
      const srv=await dev.gatt.connect();
      const svc=await srv.getPrimaryService("000018f0-0000-1000-8000-00805f9b34fb");
      const ch=await svc.getCharacteristic("00002af1-0000-1000-8000-00805f9b34fb");
      const enc=new TextEncoder();
      const lines=["\x1B\x40","\x1B\x61\x01","RestoKu\n","\x1B\x61\x00",
        `${fmtTgl(tx.waktu)} ${fmtJam(tx.waktu)} - ${tx.tipe==="takeaway"?"Take Away":"Dine In"}\n`,
        "--------------------------------\n",
        ...tx.items.map(i=>`${i.nama}\n  ${i.qty}x${fmt(i.harga)} = ${fmt(i.harga*i.qty)}\n`),
        "================================\n",
        `TOTAL   : ${fmt(tx.total)}\nBAYAR   : ${fmt(tx.bayar)}\nKEMBALI : ${fmt(tx.kembalian)}\n`,
        "================================\n","  Terima kasih!\n\n\n","\x1D\x56\x00"
      ];
      for(const l of lines) await ch.writeValue(enc.encode(l));
      alert("Struk terkirim ke printer!");
    }catch(e){if(e.name!=="NotFoundError") alert("Gagal: "+e.message);}
  };
  return (
    <div style={{padding:"16px 20px 24px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"0 0 16px",borderBottom:"1px solid #2a2a3e",marginBottom:16}}>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><Icon name="back" size={22} color="#9ca3af"/></button>
        <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>Struk Transaksi</div>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"18px",color:"#111",fontFamily:"'Space Mono',monospace",fontSize:13,marginBottom:14}}>
        <div style={{textAlign:"center",fontWeight:700,fontSize:15,marginBottom:2}}>RestoKu</div>
        <div style={{textAlign:"center",fontSize:10,color:"#555",marginBottom:10}}>{fmtTgl(tx.waktu)} · {fmtJam(tx.waktu)} · {tx.tipe==="takeaway"?"Take Away":"Dine In"}</div>
        <div style={{borderTop:"1px dashed #ccc",borderBottom:"1px dashed #ccc",padding:"7px 0",margin:"0 0 7px"}}>
          {tx.items.map((item,i)=>(
            <div key={i} style={{marginBottom:5}}>
              <div style={{fontSize:11,fontWeight:700}}>{item.nama}</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555"}}>
                <span>{item.qty} × {fmt(item.harga)}</span>
                <span style={{fontWeight:700,color:"#111"}}>{fmt(item.harga*item.qty)}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13,margin:"7px 0 3px"}}><span>Total</span><span>{fmt(tx.total)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}><span>Bayar</span><span>{fmt(tx.bayar)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:12,color:"#15803d"}}><span>Kembalian</span><span>{fmt(tx.kembalian)}</span></div>
        <div style={{textAlign:"center",fontSize:10,color:"#888",marginTop:10}}>— Terima kasih! —</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={printBT} style={{...BS("#6366f1"),width:"100%",justifyContent:"center",padding:"13px",fontSize:13}}><Icon name="print" size={17} color="#fff"/> Print Thermal Bluetooth</button>
        <div style={{background:"#1a1a24",borderRadius:10,padding:"10px 13px",fontSize:11,color:"#6b7280",lineHeight:1.6}}>💡 Perlu Chrome · Android/Desktop · Printer ESC/POS Bluetooth (Epson, XPrinter, GOOJPRT, dll)</div>
        <button onClick={onClose} style={{...BS("#2a2a3e"),width:"100%",justifyContent:"center",padding:"11px",fontSize:12}}>Kembali ke Kasir</button>
      </div>
    </div>
  );
}

// ─── LAPORAN ──────────────────────────────────────────────────────────────────
function LaporanPage({transaksi,produk,paket}) {
  const [periode,setPeriode]=useState("harian");
  const [tgl,setTgl]=useState(new Date().toISOString().slice(0,10));
  const [bulan,setBulan]=useState(new Date().toISOString().slice(0,7));

  const filtered=transaksi.filter(t=>{
    if(periode==="harian") return t.waktu.slice(0,10)===tgl;
    if(periode==="mingguan"){const b=new Date(tgl);b.setDate(b.getDate()-b.getDay());const e=new Date(b);e.setDate(e.getDate()+6);const d=new Date(t.waktu);return d>=b&&d<=e;}
    return t.waktu.slice(0,7)===bulan;
  });

  const totalPendapatan=filtered.reduce((a,t)=>a+t.total,0);
  const menuCount={};
  filtered.forEach(t=>t.items.forEach(i=>{menuCount[i.nama]=(menuCount[i.nama]||0)+i.qty;}));
  const terlaris=Object.entries(menuCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const perHari={};
  filtered.forEach(t=>{const d=t.waktu.slice(0,10);perHari[d]=(perHari[d]||0)+t.total;});
  const hariEntries=Object.entries(perHari).sort(([a],[b])=>a>b?1:-1);
  const maxHari=Math.max(...Object.values(perHari),1);

  return (
    <div style={{padding:"16px 20px"}}>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["harian","Harian"],["mingguan","Mingguan"],["bulanan","Bulanan"]].map(([v,l])=>(
          <button key={v} onClick={()=>setPeriode(v)} style={{flex:1,padding:"7px 4px",borderRadius:9,border:"1.5px solid",borderColor:periode===v?"#6366f1":"#2a2a3e",background:periode===v?"#1e1b4b":"#1a1a24",color:periode===v?"#a5b4fc":"#6b7280",fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
        ))}
      </div>
      <div style={{marginBottom:14}}>
        {(periode==="harian"||periode==="mingguan")&&<input type="date" value={tgl} onChange={e=>setTgl(e.target.value)} style={IS}/>}
        {periode==="bulanan"&&<input type="month" value={bulan} onChange={e=>setBulan(e.target.value)} style={IS}/>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <Card bg="linear-gradient(135deg,#6366f1,#8b5cf6)">
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Total Pendapatan</div>
          <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{fmt(totalPendapatan)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{filtered.length} transaksi</div>
        </Card>
        <Card bg="linear-gradient(135deg,#0f766e,#0d9488)">
          <div style={{fontSize:10,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Rata-rata / Transaksi</div>
          <div style={{fontSize:20,fontWeight:900,color:"#fff",marginTop:4}}>{fmt(filtered.length>0?Math.round(totalPendapatan/filtered.length):0)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:2}}>{terlaris.length>0?`Top: ${terlaris[0][0]}`:"—"}</div>
        </Card>
      </div>

      {hariEntries.length>1&&(
        <>
          <ST>📈 Grafik Pendapatan</ST>
          <div style={{background:"#1a1a24",borderRadius:13,padding:"13px 14px",marginBottom:18}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:72}}>
              {hariEntries.map(([d,v])=>(
                <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{width:"100%",background:"#6366f1",borderRadius:"3px 3px 0 0",height:`${Math.round((v/maxHari)*62)+4}px`,minHeight:3,opacity:0.8}}/>
                  <div style={{fontSize:8,color:"#4b5563",textAlign:"center"}}>{d.slice(5)}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      <ST>🏆 Menu Terlaris</ST>
      {terlaris.length===0?<Empty t="Tidak ada transaksi di periode ini"/>:terlaris.map(([nama,qty],i)=>{
        const tot=filtered.filter(t=>t.items.some(x=>x.nama===nama)).reduce((a,t)=>a+t.items.filter(x=>x.nama===nama).reduce((s,x)=>s+x.harga*x.qty,0),0);
        return (
          <div key={nama} style={{background:"#1a1a24",borderRadius:12,padding:"10px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:26,height:26,background:["#f59e0b","#94a3b8","#cd7c2f","#4b5563","#4b5563"][i],borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",fontFamily:"'Space Mono'"}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{nama}</div>
              <div style={{fontSize:10,color:"#6b7280"}}>{qty} terjual</div>
            </div>
            <div style={{fontSize:12,fontWeight:800,color:"#22c55e",fontFamily:"'Space Mono'"}}>{fmt(tot)}</div>
          </div>
        );
      })}

      <ST mt={14}>🧾 Riwayat Transaksi</ST>
      {filtered.length===0?<Empty t="Tidak ada transaksi"/>:filtered.map(t=>(
        <div key={t.id} style={{background:"#1a1a24",borderRadius:12,padding:"9px 14px",marginBottom:7}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:"#6b7280",fontFamily:"'Space Mono'"}}>{fmtJam(t.waktu)}</span>
              <span style={{fontSize:9,background:t.tipe==="takeaway"?"#1a1400":"#0f1a2e",color:t.tipe==="takeaway"?"#fbbf24":"#60a5fa",padding:"1px 5px",borderRadius:7,fontWeight:700}}>{t.tipe==="takeaway"?"Take Away":"Dine In"}</span>
            </div>
            <span style={{fontSize:13,fontWeight:800,color:"#22c55e"}}>{fmt(t.total)}</span>
          </div>
          <div style={{fontSize:11,color:"#9ca3af"}}>{t.items.map(i=>`${i.nama}×${i.qty}`).join(", ")}</div>
        </div>
      ))}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
