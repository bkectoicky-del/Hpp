// ─── PERSISTENT STORAGE HOOK ─────────────────────────────────────────────────
// Simpan & baca dari localStorage. Fallback ke initialValue kalau belum ada.
function useLocalStorage(key, initialValue) {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch {
      return initialValue;
    }
  });

  const setValue = (value) => {
    try {
      const valueToStore = value instanceof Function ? value(storedValue) : value;
      setStoredValue(valueToStore);
      window.localStorage.setItem(key, JSON.stringify(valueToStore));
    } catch (err) {
      console.warn("localStorage error:", err);
    }
  };

  return [storedValue, setValue];
}

// Reset semua data ke seed awal (factory reset)
function clearAllData() {
  ["restoku_menus", "restoku_stok", "restoku_transaksi"].forEach(k =>
    window.localStorage.removeItem(k)
  );
  window.location.reload();
}

// Harga pakai per 1 unit bahan (pcs = per butir, gram/ml = per gram)
function hargaPerUnit(s) {
  if (s.satuan === "pcs") return s.harga_beli_per_pcs || 0;
  return s.harga_beli_per_gram || 0;
}

function calcHPP(menu, stok) {
  let hpp_bahan = 0;
  menu.bahan.forEach(b => {
    const s = stok[b.bahan_id];
    if (!s) return;
    hpp_bahan += b.qty * hargaPerUnit(s);
  });
  const biaya = Object.values(menu.biaya_tambahan || {}).reduce((a, b) => a + Number(b), 0);
  return { hpp_bahan: Math.round(hpp_bahan), biaya_tambahan: biaya, hpp_total: Math.round(hpp_bahan + biaya) };
}

function getStokPersen(s) {
  return s.stok_awal > 0 ? Math.round((s.stok_saat_ini / s.stok_awal) * 100) : 0;
}

function getStokWarna(pct) {
  if (pct >= 70) return { bg: "#22c55e", text: "#15803d", light: "#dcfce7", label: "Aman" };
  if (pct >= 30) return { bg: "#f59e0b", text: "#b45309", light: "#fef3c7", label: "Warning" };
  return { bg: "#ef4444", text: "#b91c1c", light: "#fee2e2", label: "Kritis" };
}

// ─── HELPERS: HITUNG PORSI ────────────────────────────────────────────────────
// Hitung berapa porsi maksimal yang bisa dibuat dari stok saat ini
function hitungPorsi(menu, stok) {
  if (!menu.bahan || menu.bahan.length === 0) return 0;
  let minPorsi = Infinity;
  menu.bahan.forEach(b => {
    const s = stok[b.bahan_id];
    if (!s || b.qty <= 0) return;
    const tersedia = s.stok_saat_ini;
    const porsi = Math.floor(tersedia / b.qty);
    if (porsi < minPorsi) minPorsi = porsi;
  });
  return minPorsi === Infinity ? 0 : minPorsi;
}

// Bahan mana yang jadi bottleneck (paling sedikit porsinya)
function bottleneckBahan(menu, stok) {
  let min = Infinity, nama = "";
  menu.bahan.forEach(b => {
    const s = stok[b.bahan_id];
    if (!s || b.qty <= 0) return;
    const porsi = Math.floor(s.stok_saat_ini / b.qty);
    if (porsi < min) { min = porsi; nama = b.nama; }
  });
  return nama;
}

    menuCount[i.nama] = (menuCount[i.nama] || 0) + i.qty;
  }));
  const terlaris = Object.entries(menuCount).sort((a, b) => b[1] - a[1]).slice(0, 3);

  // Hitung porsi per menu
  const porsiData = menus.map(m => ({
    ...m,
    porsi: hitungPorsi(m, stok),
    bottleneck: bottleneckBahan(m, stok),
  })).sort((a, b) => a.porsi - b.porsi); // urutkan dari paling sedikit

  const totalPorsiSemuaMenu = porsiData.reduce((a, m) => a + m.porsi, 0);
  const menuHabis = porsiData.filter(m => m.porsi === 0).length;

          <div style={{ fontSize: 22, fontWeight: 900, color: "#fff", marginTop: 4 }}>{totalPorsiSemuaMenu} porsi</div>

          </div>
        </Card>
      </div>

      {/* PORSI PER MENU */}
      <SectionTitle>🍽️ Estimasi Porsi dari Stok Saat Ini</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
        {porsiData.map(m => {
          const porsiMax = Math.max(...porsiData.map(x => x.porsi), 1);
          const barPct = Math.min(100, Math.round((m.porsi / porsiMax) * 100));
          const warna = m.porsi === 0 ? "#ef4444" : m.porsi <= 5 ? "#f59e0b" : "#22c55e";
          const warnaLight = m.porsi === 0 ? "#fee2e2" : m.porsi <= 5 ? "#fef3c7" : "#dcfce7";
          const warnaText = m.porsi === 0 ? "#b91c1c" : m.porsi <= 5 ? "#b45309" : "#15803d";
          const label = m.porsi === 0 ? "Habis" : m.porsi <= 5 ? "Hampir habis" : "Tersedia";
          return (
            <div key={m.id} style={{ background: "#1a1a24", borderRadius: 14, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "#e2e8f0" }}>{m.nama}</div>
                  <div style={{ fontSize: 11, color: "#4b5563", marginTop: 1 }}>
                    {m.porsi === 0
                      ? `⛔ Bahan kurang: ${m.bottleneck}`

                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>

function MenuPage({ menus, setMenus, stok, setStok, allBahan }) {
  const [view, setView] = useState("list");
  const [editMenu, setEditMenu] = useState(null);
  const [hppView, setHppView] = useState(null);

  const deleteMenu = (id) => {
    setMenus(prev => prev.filter(m => m.id !== id));
  };

  const saveMenu = (menu) => {
    if (menu.id && menus.find(m => m.id === menu.id)) {
      setMenus(prev => prev.map(m => m.id === menu.id ? menu : m));
    } else {
      setMenus(prev => [...prev, { ...menu, id: "m" + uid() }]);
    }
    // sync bahan ke stok
    const newBahan = {};
    [...menus, menu].forEach(m => m.bahan.forEach(b => {
      if (!stok[b.bahan_id] && !newBahan[b.bahan_id]) {
        newBahan[b.bahan_id] = { nama: b.nama, stok_awal: 0, stok_saat_ini: 0, satuan: b.satuan, harga_beli_per_gram: 0, harga_beli_per_unit: 0, unit_qty: 1000 };
      }
    }));
    if (Object.keys(newBahan).length > 0) setStok(prev => ({ ...prev, ...newBahan }));
    setView("list");
    setEditMenu(null);
  };

  if (hppView) return <HppView menu={hppView} stok={stok} onBack={() => setHppView(null)} />;
  if (view === "form") return <MenuForm menu={editMenu} onSave={saveMenu} onBack={() => { setView("list"); setEditMenu(null); }} />;

  const kategoris = [...new Set(menus.map(m => m.kategori))];

  return (
    <div style={{ padding: "16px 20px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 13, color: "#6b7280" }}>{menus.length} menu terdaftar</span>
        <button onClick={() => { setEditMenu(null); setView("form"); }} style={btnStyle("#6366f1")}>
          <Icon name="plus" size={16} color="#fff" /> Tambah Menu
        </button>
      </div>

      {kategoris.map(kat => (
        <div key={kat} style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: "#6366f1", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{kat}</div>
          {menus.filter(m => m.kategori === kat).map(menu => {
            const hpp = calcHPP(menu, stok);
            return (
              <div key={menu.id} style={{ background: "#1a1a24", borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>{menu.nama}</div>
                    <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>{menu.bahan.length} bahan · HPP {fmt(hpp.hpp_total)}</div>
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: "#22c55e" }}>{fmt(menu.harga_jual)}</div>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                  {menu.bahan.map(b => (
                    <span key={b.bahan_id} style={{ fontSize: 11, background: "#0f0f18", color: "#9ca3af", padding: "3px 8px", borderRadius: 20, border: "1px solid #2a2a3e" }}>
                      {b.nama} {b.qty}{b.satuan}
                    </span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setHppView(menu)} style={{ ...btnStyle("#0f766e"), fontSize: 12, padding: "6px 12px" }}>Lihat HPP</button>
                  <button onClick={() => { setEditMenu(menu); setView("form"); }} style={{ ...btnStyle("#2563eb"), fontSize: 12, padding: "6px 12px" }}>Edit</button>
                  <button onClick={() => deleteMenu(menu.id)} style={{ ...btnStyle("#7f1d1d", "#ef4444"), fontSize: 12, padding: "6px 12px" }}>Hapus</button>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ─── HELPERS FOR DISPLAY ──────────────────────────────────────────────────────
function fmtStokQty(s, field = "stok_saat_ini") {
  const qty = s[field];
  if (s.satuan === "pcs") return `${qty} pcs`;
  if (qty >= 1000) return `${(qty / 1000).toFixed(2)} ${s.satuan === "gram" ? "kg" : "L"}`;
  return `${qty} ${s.satuan}`;
}
function fmtHargaPerUnit(s) {
  if (s.satuan === "pcs") return `${fmt(s.harga_beli_per_pcs || 0)}/pcs`;
  return `${fmt((s.harga_beli_per_gram || 0) * 1000)}/kg`;
}
function nilaiStok(s) {
  if (s.satuan === "pcs") return s.stok_saat_ini * (s.harga_beli_per_pcs || 0);
  return s.stok_saat_ini * (s.harga_beli_per_gram || 0);
}

// ─── STOK PAGE ────────────────────────────────────────────────────────────────
const UNIT_NAMA_OPTIONS = {
  gram: ["gram", "kg"], ml: ["ml", "liter"],
  pcs: ["pcs", "lusin (12)", "kodi (20)", "gross (144)"],
};
const UNIT_KONVERSI = {
  "gram": 1, "kg": 1000, "ml": 1, "liter": 1000,
  "pcs": 1, "lusin (12)": 12, "kodi (20)": 20, "gross (144)": 144,
};

function StokPage({ stok, setStok, allBahan }) {
  const [selected, setSelected] = useState("");
  const [inputQty, setInputQty] = useState("");
  const [inputUnit, setInputUnit] = useState("gram");   // satuan input pembelian
  const [hargaBeli, setHargaBeli] = useState("");        // harga total per pembelian
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState("");     // stok tersedia (dalam display unit)
  const [editMax, setEditMax] = useState("");     // stok maksimal (dalam display unit)
  const bahan = allBahan();

  // Konversi dari satuan dasar (gram/ml/pcs) → display unit untuk input
  const toDisplayVal = (s, field) => {
    const qty = s[field] || 0;
    if (s.satuan === "pcs") return String(qty);
    return qty >= 1000 ? String((qty / 1000).toFixed(3)) : String(qty);
  };

  // Konversi dari display unit → satuan dasar (gram/ml/pcs) untuk simpan
  const toBaseDasar = (s, val) => {
    const num = parseFloat(val);
    if (s.satuan === "pcs") return num;
    // Kalau stok awal >= 1000, user input dalam kg/L
    return (s.stok_awal >= 1000 || s.stok_saat_ini >= 1000) ? num * 1000 : num;
  };

  const handleEditStok = (id) => {
    const s = stok[id];
    setEditVal(toDisplayVal(s, "stok_saat_ini"));
    setEditMax(toDisplayVal(s, "stok_awal"));
    setEditId(id);
  };

  const handleSaveEdit = (id) => {
    const s = stok[id];
    const valTersedia = parseFloat(editVal);
    const valMaksimal = parseFloat(editMax);
    if (isNaN(valTersedia) || valTersedia < 0) return alert("Stok tersedia tidak valid!");
    if (isNaN(valMaksimal) || valMaksimal <= 0) return alert("Stok maksimal harus lebih dari 0!");
    if (valTersedia > valMaksimal) return alert("Stok tersedia tidak boleh melebihi stok maksimal!");
    const dasarTersedia = toBaseDasar(s, editVal);
    const dasarMaksimal = toBaseDasar(s, editMax);
    setStok(prev => ({
      ...prev,
      [id]: { ...prev[id], stok_saat_ini: dasarTersedia, stok_awal: dasarMaksimal }
    }));
    setEditId(null);
    setEditVal("");
    setEditMax("");
  };

  const handleCancelEdit = () => { setEditId(null); setEditVal(""); setEditMax(""); };

  // Satuan dasar bahan yang dipilih
  const selectedStok = stok[selected];
  const satuanDasar = selectedStok?.satuan || (bahan[selected]?.satuan === "pcs" ? "pcs" : "gram");
  const isPcs = satuanDasar === "pcs";

  // Unit options berdasarkan satuan dasar
  const unitOptions = isPcs
    ? ["pcs", "lusin (12)", "kodi (20)", "gross (144)"]
    : satuanDasar === "ml"
    ? ["ml", "liter"]
    : ["gram", "kg"];

  // Saat bahan dipilih, reset input satuan ke default
  const handleSelectBahan = (id) => {
    setSelected(id);
    const s = stok[id];
    const dasar = s?.satuan || bahan[id]?.satuan || "gram";
    setInputUnit(dasar === "pcs" ? "pcs" : dasar === "ml" ? "ml" : "gram");
    setHargaBeli(s?.harga_beli_per_unit?.toString() || "");
    setInputQty("");
  };

  const handleTambahStok = () => {
    if (!selected || !inputQty || !hargaBeli) return alert("Lengkapi semua field!");
    const konversi = UNIT_KONVERSI[inputUnit] || 1;
    const qtyDasar = Number(inputQty) * konversi;          // dalam satuan dasar (gram/ml/pcs)
    const hargaPerDasar = isPcs
      ? Number(hargaBeli) / konversi                        // harga per pcs
      : Number(hargaBeli) / (Number(inputQty) * konversi); // harga per gram/ml

    setStok(prev => ({
      ...prev,
      [selected]: {
        ...prev[selected],
        nama: bahan[selected]?.nama || selected,
        satuan: satuanDasar,
        stok_awal: (prev[selected]?.stok_awal || 0) + qtyDasar,
        stok_saat_ini: (prev[selected]?.stok_saat_ini || 0) + qtyDasar,
        // pcs fields
        ...(isPcs ? {
          harga_beli_per_pcs: Number(hargaBeli) / konversi,
          harga_beli_per_unit: Number(hargaBeli),
          unit_nama: inputUnit,
          unit_qty: konversi,
        } : {
          harga_beli_per_gram: hargaPerDasar,
          harga_beli_per_unit: Number(hargaBeli),
          unit_nama: inputUnit,
          unit_qty: konversi,
        }),
      }
    }));
    setInputQty(""); setHargaBeli(""); setSelected("");
  };

  // Preview harga per unit dasar
  const previewHarga = () => {
    if (!inputQty || !hargaBeli) return null;
    const konversi = UNIT_KONVERSI[inputUnit] || 1;
    if (isPcs) {
      const perPcs = Number(hargaBeli) / konversi;
      return `= ${fmt(perPcs)} / pcs`;
    } else {
      const totalDasar = Number(inputQty) * konversi;
      const perGram = Number(hargaBeli) / totalDasar;
      return `= ${fmt(perGram * 1000)} / kg`;
    }
  };

  return (
    <div style={{ padding: "16px 20px" }}>
      <div style={{ background: "#1a1a24", borderRadius: 16, padding: "16px", marginBottom: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 800, color: "#6366f1", marginBottom: 12, letterSpacing: 1 }}>📦 TAMBAH / UPDATE STOK</div>

        <FormGroup label="Pilih Bahan (dari Menu)">
          <select value={selected} onChange={e => handleSelectBahan(e.target.value)} style={inputStyle}>
            <option value="">-- Pilih bahan --</option>
            {Object.entries(bahan).map(([id, b]) => (
              <option key={id} value={id}>
                {b.nama} {b.satuan === "pcs" ? "🥚 pcs" : `(${b.satuan})`}
              </option>
            ))}
          </select>
        </FormGroup>

        {selected && (
          <>
            {/* Label info satuan dasar */}
            <div style={{ background: isPcs ? "#1e1b4b" : "#0f2a1e", borderRadius: 8, padding: "8px 12px", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: isPcs ? "#a5b4fc" : "#6ee7b7" }}>
                {isPcs ? "🥚 Bahan dihitung per pcs" : `⚖️ Bahan dihitung per ${satuanDasar}`}
              </span>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <FormGroup label="Jumlah Beli">
                <input type="number" value={inputQty} onChange={e => setInputQty(e.target.value)}
                  placeholder={isPcs ? "1" : "0"} style={{ ...inputStyle, marginBottom: 0 }} />
              </FormGroup>
              <FormGroup label={isPcs ? "Satuan Beli" : "Satuan Beli"}>
                <select value={inputUnit} onChange={e => setInputUnit(e.target.value)} style={{ ...inputStyle, marginBottom: 0 }}>
                  {unitOptions.map(s => <option key={s}>{s}</option>)}
                </select>
              </FormGroup>
            </div>

            <FormGroup label={`Harga Beli Total (Rp) per ${inputUnit}`}>
              <input type="number" value={hargaBeli} onChange={e => setHargaBeli(e.target.value)}
                placeholder={isPcs ? "50000 (1 kodi)" : "30000"} style={inputStyle} />
            </FormGroup>

            {previewHarga() && (
              <div style={{ background: "#0f0f18", borderRadius: 8, padding: "8px 12px", marginBottom: 10, display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 12, color: "#6b7280" }}>Otomatis dihitung:</span>
                <span style={{ fontSize: 13, fontWeight: 800, color: "#22c55e", fontFamily: "'Space Mono'" }}>{previewHarga()}</span>
              </div>
            )}
          </>
        )}

        <button onClick={handleTambahStok} style={{ ...btnStyle("#6366f1"), width: "100%", justifyContent: "center", padding: "12px", marginTop: 4 }}>
          <Icon name="plus" size={16} color="#fff" /> Update Stok
        </button>
      </div>

      <SectionTitle>📊 Daftar Stok Bahan</SectionTitle>
      {Object.entries(stok).map(([id, s]) => {
        const pct = getStokPersen(s);
        const w = getStokWarna(pct);
        const isEditing = editId === id;
        const displayUnit = s.satuan === "pcs" ? "pcs"
          : (s.stok_awal >= 1000 || s.stok_saat_ini >= 1000) ? (s.satuan === "gram" ? "kg" : "L")
          : s.satuan;
        return (
          <div key={id} style={{ background: isEditing ? "#1a1a2e" : "#1a1a24", borderRadius: 14, padding: "14px 16px", marginBottom: 10, border: isEditing ? "1.5px solid #6366f1" : "1.5px solid transparent", transition: "all .2s" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "#e2e8f0" }}>{s.nama}</div>
                  {s.satuan === "pcs" && <span style={{ fontSize: 10, background: "#1e1b4b", color: "#a5b4fc", padding: "1px 6px", borderRadius: 10, fontWeight: 700 }}>PCS</span>}
                </div>
                <div style={{ fontSize: 11, color: "#6b7280" }}>
                  {fmtHargaPerUnit(s)} · Nilai: {fmt(nilaiStok(s))}
                </div>
              </div>
              <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                <div style={{ fontFamily: "'Space Mono'", fontSize: 14, color: w.bg, fontWeight: 700 }}>{pct}%</div>
                <div style={{ fontSize: 10, background: w.light, color: w.text, padding: "1px 6px", borderRadius: 10, fontWeight: 800 }}>{w.label}</div>
              </div>
            </div>
            <div style={{ background: "#0f0f18", borderRadius: 6, height: 8, overflow: "hidden", marginBottom: 8 }}>
              <div style={{ width: `${pct}%`, height: "100%", background: w.bg, borderRadius: 6 }} />
            </div>

            {/* ── EDIT MODE ── */}
            {isEditing ? (
              <div style={{ marginTop: 4 }}>
                <div style={{ fontSize: 11, color: "#a5b4fc", fontWeight: 700, marginBottom: 10 }}>✏️ Edit Stok</div>

                {/* Stok Tersedia */}
                <div style={{ marginBottom: 8 }}>
                  <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>Stok Tersedia</div>
                  <div style={{ display: "flex", alignItems: "center", background: "#0f0f18", borderRadius: 10, border: "1.5px solid #6366f1", overflow: "hidden" }}>
                    <input
                      type="number"
                      value={editVal}
                      onChange={e => setEditVal(e.target.value)}
                      onKeyDown={e => { if (e.key === "Escape") handleCancelEdit(); }}
                      autoFocus
                      style={{ flex: 1, background: "transparent", border: "none", padding: "10px 12px", color: "#e2e8f0", fontSize: 15, fontWeight: 700, outline: "none", fontFamily: "'Space Mono', monospace" }}
                    />
                    <span style={{ padding: "0 12px", color: "#6366f1", fontSize: 13, fontWeight: 700 }}>{displayUnit}</span>
                  </div>
                </div>

                {/* Stok Maksimal */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>Stok Maksimal <span style={{ color: "#4b5563", fontWeight: 400, textTransform: "none" }}>(acuan 100%)</span></div>
                  <div style={{ display: "flex", alignItems: "center", background: "#0f0f18", borderRadius: 10, border: "1.5px solid #374151", overflow: "hidden" }}>
                    <input
                      type="number"
                      value={editMax}
                      onChange={e => setEditMax(e.target.value)}
                      onKeyDown={e => { if (e.key === "Escape") handleCancelEdit(); }}
                      style={{ flex: 1, background: "transparent", border: "none", padding: "10px 12px", color: "#e2e8f0", fontSize: 15, fontWeight: 700, outline: "none", fontFamily: "'Space Mono', monospace" }}
                    />
                    <span style={{ padding: "0 12px", color: "#9ca3af", fontSize: 13, fontWeight: 700 }}>{displayUnit}</span>
                  </div>
                  {editVal && editMax && parseFloat(editVal) > parseFloat(editMax) && (
                    <div style={{ fontSize: 10, color: "#ef4444", marginTop: 4 }}>⚠ Tersedia tidak boleh melebihi maksimal</div>
                  )}
                </div>

                {/* Preview persentase baru */}
                {editVal && editMax && parseFloat(editMax) > 0 && parseFloat(editVal) <= parseFloat(editMax) && (
                  <div style={{ background: "#0f0f18", borderRadius: 8, padding: "7px 12px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#6b7280" }}>Preview persentase:</span>
                    <span style={{ fontSize: 13, fontWeight: 800, color: "#22c55e", fontFamily: "'Space Mono'" }}>
                      {Math.round((parseFloat(editVal) / parseFloat(editMax)) * 100)}%
                    </span>
                  </div>
                )}

                {/* Action buttons */}
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => handleSaveEdit(id)} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: "#22c55e", border: "none", borderRadius: 10, padding: "11px", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff" }}>
                    <Icon name="check" size={16} color="#fff" /> Simpan
                  </button>
                  <button onClick={handleCancelEdit} style={{ background: "#2a2a3e", border: "none", borderRadius: 10, padding: "11px 16px", cursor: "pointer", display: "flex", alignItems: "center" }}>
                    <Icon name="close" size={16} color="#9ca3af" />
                  </button>
                </div>
              </div>
            ) : (
              /* ── NORMAL MODE ── */
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <span style={{ fontSize: 13, color: "#9ca3af", fontFamily: "'Space Mono'", fontWeight: 700 }}>{fmtStokQty(s)}</span>
                  <span style={{ fontSize: 11, color: "#4b5563" }}> / {fmtStokQty(s, "stok_awal")}</span>
                </div>
                <button
                  onClick={() => handleEditStok(id)}
                  style={{ display: "flex", alignItems: "center", gap: 5, background: "#1f1f2e", border: "1px solid #2a2a3e", borderRadius: 8, padding: "5px 10px", cursor: "pointer", color: "#9ca3af", fontSize: 11, fontWeight: 700 }}>
                  <Icon name="edit" size={13} color="#6366f1" /> Edit Stok
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── KASIR PAGE ───────────────────────────────────────────────────────────────
function KasirPage({ menus, addTransaksi, stok }) {
  const [cart, setCart] = useState([]);
  const [bayar, setBayar] = useState("");
  const [sukses, setSukses] = useState(false);

  const total = cart.reduce((a, i) => a + i.harga * i.qty, 0);
  const kembalian = Number(bayar) - total;

  const addToCart = (menu) => {
    setCart(prev => {
      const found = prev.find(i => i.menu_id === menu.id);
      if (found) return prev.map(i => i.menu_id === menu.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { menu_id: menu.id, nama: menu.nama, harga: menu.harga_jual, qty: 1 }];
    });
  };

  const changeQty = (menu_id, delta) => {
    setCart(prev => prev.map(i => i.menu_id === menu_id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0));
  };

  const handleBayar = () => {
    if (cart.length === 0) return alert("Keranjang kosong!");
    if (Number(bayar) < total) return alert("Bayar kurang!");
    addTransaksi({ id: "t" + uid(), waktu: new Date().toISOString(), items: cart, total, bayar: Number(bayar), kembalian });
    setSukses(true);
    setTimeout(() => { setSukses(false); setCart([]); setBayar(""); }, 3000);
  };

  if (sukses) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "60vh", gap: 16 }}>
        <div style={{ width: 80, height: 80, background: "#14532d", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name="check" size={48} color="#22c55e" />
        </div>
        <div style={{ fontSize: 22, fontWeight: 900, color: "#22c55e" }}>Transaksi Berhasil!</div>
        <div style={{ fontSize: 16, color: "#9ca3af" }}>Total: {fmt(total)}</div>
        <div style={{ fontSize: 16, color: "#6366f1", fontWeight: 700 }}>Kembalian: {fmt(Math.max(0, kembalian))}</div>
        <div style={{ fontSize: 12, color: "#4b5563" }}>Stok otomatis diperbarui ✓</div>
      </div>
    );
  }

  const kategoris = [...new Set(menus.map(m => m.kategori))];

  return (
    <div style={{ padding: "0" }}>
      {/* MENU GRID */}
      <div style={{ padding: "16px 20px 8px" }}>
        {kategoris.map(kat => (
          <div key={kat} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#6366f1", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{kat}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {menus.filter(m => m.kategori === kat).map(menu => {
                const inCart = cart.find(i => i.menu_id === menu.id);
                return (
                  <button key={menu.id} onClick={() => addToCart(menu)}
                    style={{ background: inCart ? "#1e1b4b" : "#1a1a24", border: inCart ? "1.5px solid #6366f1" : "1.5px solid transparent", borderRadius: 14, padding: "14px 12px", textAlign: "left", cursor: "pointer", position: "relative", transition: "all .15s" }}>
                    {inCart && <div style={{ position: "absolute", top: 8, right: 8, background: "#6366f1", color: "#fff", fontSize: 11, fontWeight: 800, borderRadius: 20, padding: "1px 7px" }}>{inCart.qty}×</div>}
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#e2e8f0", marginBottom: 4, lineHeight: 1.2 }}>{menu.nama}</div>
                    <div style={{ fontSize: 14, fontWeight: 900, color: "#22c55e" }}>{fmt(menu.harga_jual)}</div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* CART */}
      {cart.length > 0 && (
        <div style={{ background: "#1a1a24", borderTop: "1px solid #2a2a3e", padding: "16px 20px" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#6b7280", marginBottom: 10, letterSpacing: 1, textTransform: "uppercase" }}>🛒 Pesanan</div>
          {cart.map(item => (
            <div key={item.menu_id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0" }}>{item.nama}</div>
                <div style={{ fontSize: 12, color: "#9ca3af" }}>{fmt(item.harga)} × {item.qty}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: "#22c55e", marginRight: 8 }}>{fmt(item.harga * item.qty)}</div>
                <button onClick={() => changeQty(item.menu_id, -1)} style={{ width: 26, height: 26, borderRadius: 8, background: "#2a2a3e", border: "none", cursor: "pointer", color: "#e2e8f0", fontSize: 16, fontWeight: 700 }}>−</button>
                <span style={{ fontSize: 14, fontWeight: 800, color: "#e2e8f0", minWidth: 20, textAlign: "center" }}>{item.qty}</span>
                <button onClick={() => changeQty(item.menu_id, 1)} style={{ width: 26, height: 26, borderRadius: 8, background: "#6366f1", border: "none", cursor: "pointer", color: "#fff", fontSize: 16, fontWeight: 700 }}>+</button>
              </div>
            </div>
          ))}

          <div style={{ height: 1, background: "#2a2a3e", margin: "12px 0" }} />

          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Total</span>
            <span style={{ fontSize: 18, fontWeight: 900, color: "#22c55e", fontFamily: "'Space Mono'" }}>{fmt(total)}</span>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
            <FormGroup label="Bayar (Rp)">
              <input type="number" value={bayar} onChange={e => setBayar(e.target.value)} placeholder={total.toString()} style={{ ...inputStyle, marginBottom: 0 }} />
            </FormGroup>
            <FormGroup label="Kembalian">
              <div style={{ background: "#0f0f18", borderRadius: 10, padding: "11px 14px", fontSize: 14, fontWeight: 800, color: kembalian >= 0 && bayar ? "#22c55e" : "#ef4444", border: "1.5px solid #1f1f2e" }}>
                {bayar ? fmt(Math.max(0, kembalian)) : "–"}
              </div>
            </FormGroup>
          </div>

          <button onClick={handleBayar} style={{ ...btnStyle("#22c55e", "#15803d"), width: "100%", justifyContent: "center", padding: "14px", fontSize: 15 }}>
            <Icon name="check" size={20} color="#fff" /> Proses Pembayaran
          </button>
        </div>
      )}
    </div>
  );
}

// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function Card({ children, bg }) {
  return <div style={{ background: bg, borderRadius: 16, padding: "16px" }}>{children}</div>;
}
function SectionTitle({ children }) {
  return <div style={{ fontSize: 12, fontWeight: 800, color: "#6b7280", marginBottom: 10, letterSpacing: 1, textTransform: "uppercase" }}>{children}</div>;
}
function FormGroup({ label, children }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <label style={labelStyle}>{label}</label>
      {children}
    </div>
  );
}
function Row({ label, value, bold, small }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
      <span style={{ fontSize: small ? 12 : 13, color: "#9ca3af" }}>{label}</span>
      <span style={{ fontSize: small ? 12 : 14, fontWeight: bold ? 800 : 600, color: bold ? "#e2e8f0" : "#94a3b8", fontFamily: bold ? "'Space Mono'" : "inherit" }}>{value}</span>
    </div>
  );
}
function EmptyState({ text }) {
  return <div style={{ textAlign: "center", padding: "20px", color: "#4b5563", fontSize: 13 }}>{text}</div>;
}

// ─── STYLE HELPERS ────────────────────────────────────────────────────────────
const inputStyle = {
  width: "100%", background: "#0f0f18", border: "1.5px solid #2a2a3e", borderRadius: 10,
  padding: "10px 14px", color: "#e2e8f0", fontSize: 14, fontFamily: "'Nunito', sans-serif",
  outline: "none", boxSizing: "border-box", marginBottom: 0,
};
const labelStyle = { fontSize: 11, fontWeight: 700, color: "#6b7280", letterSpacing: 0.5, display: "block", marginBottom: 5, textTransform: "uppercase" };

const btnStyle = (bg, hover) => ({
  display: "inline-flex", alignItems: "center", gap: 6,
  background: bg, border: "none", borderRadius: 10, padding: "8px 14px",
  color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif",
});


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

    if ('serviceWorker' in navigator) {
      const isProd = !location.hostname.includes('claudeusercontent.com') &&
                     location.hostname !== 'localhost' &&
                     !location.hostname.includes('127.0.0.1');
      if (isProd) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(() => console.log('[RestoKu] Offline mode aktif ✓'))
            .catch(e => console.warn('[RestoKu] SW gagal:', e.message));
        });
      } else {
        console.log('[RestoKu] Preview mode — Service Worker dinonaktifkan.');
      }
    }
  </script>
